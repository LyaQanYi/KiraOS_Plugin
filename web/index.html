<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KiraOS WebUI</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   Satoshi Font + CSS Reset
   ═══════════════════════════════════════════════════════════════ */
@font-face {
  font-family: 'Satoshi';
  src: url('https://cdn.jsdelivr.net/gh/nicepkg/gpt-runner@master/packages/gpt-web/src/assets/fonts/Satoshi-Variable.woff2') format('woff2');
  font-weight: 300 900;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Satoshi', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --bg-gradient: linear-gradient(160deg, #f5f6fa 0%, #ebedf5 100%);
  --glass-bg: rgba(255, 255, 255, 0.78);
  --glass-bg-hover: rgba(255, 255, 255, 0.90);
  --glass-bg-active: rgba(255, 255, 255, 0.96);
  --glass-border: rgba(0, 0, 0, 0.06);
  --glass-border-hover: rgba(0, 0, 0, 0.10);
  --glass-shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
  --glass-blur: blur(20px);
  --text-primary: #1a1a2e;
  --text-secondary: #4a4a6a;
  --text-muted: rgba(26, 26, 46, 0.50);
  --text-on-glass: #1a1a2e;
  --accent: #4f46e5;
  --accent-light: #818cf8;
  --danger: #dc2626;
  --danger-hover: #b91c1c;
  --success: #059669;
  --radius-btn: 10px;
  --radius-card: 14px;
  --radius-input: 8px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --focus-ring: 0 0 0 3px rgba(79, 70, 229, 0.3);
  --nav-width: 240px;
}

/* ═══════════════════════════════════════════════════════════════
   Dark Mode
   ═══════════════════════════════════════════════════════════════ */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg-gradient: linear-gradient(160deg, #0f0f1a 0%, #161625 100%);
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-bg-hover: rgba(255, 255, 255, 0.10);
    --glass-bg-active: rgba(255, 255, 255, 0.14);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-border-hover: rgba(255, 255, 255, 0.14);
    --glass-shadow: 0 1px 3px rgba(0, 0, 0, 0.20), 0 4px 16px rgba(0, 0, 0, 0.16);
    --text-primary: #e4e4ed;
    --text-secondary: #a8a8c0;
    --text-muted: rgba(228, 228, 237, 0.45);
    --text-on-glass: #e4e4ed;
    --accent: #818cf8;
    --accent-light: #a5b4fc;
    --danger: #f87171;
    --danger-hover: #ef4444;
    --success: #34d399;
    --focus-ring: 0 0 0 3px rgba(129, 140, 248, 0.35);
  }
}

[data-theme="dark"] {
  --bg-gradient: linear-gradient(160deg, #0f0f1a 0%, #161625 100%);
  --glass-bg: rgba(255, 255, 255, 0.06);
  --glass-bg-hover: rgba(255, 255, 255, 0.10);
  --glass-bg-active: rgba(255, 255, 255, 0.14);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-hover: rgba(255, 255, 255, 0.14);
  --glass-shadow: 0 1px 3px rgba(0, 0, 0, 0.20), 0 4px 16px rgba(0, 0, 0, 0.16);
  --text-primary: #e4e4ed;
  --text-secondary: #a8a8c0;
  --text-muted: rgba(228, 228, 237, 0.45);
  --text-on-glass: #e4e4ed;
  --accent: #818cf8;
  --accent-light: #a5b4fc;
  --danger: #f87171;
  --danger-hover: #ef4444;
  --success: #34d399;
  --focus-ring: 0 0 0 3px rgba(129, 140, 248, 0.35);
}

html, body {
  height: 100%;
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--bg-gradient);
  background-attachment: fixed;
  overflow: hidden;
}

/* Theme transition — disabled on initial load via .no-transition */
html:not(.no-transition),
html:not(.no-transition) body,
html:not(.no-transition) .header,
html:not(.no-transition) .nav-sidebar,
html:not(.no-transition) .glass-card,
html:not(.no-transition) .user-card,
html:not(.no-transition) .modal,
html:not(.no-transition) .toast,
html:not(.no-transition) .btn,
html:not(.no-transition) .badge,
html:not(.no-transition) .cat-header,
html:not(.no-transition) .profile-row,
html:not(.no-transition) .edit-form input,
html:not(.no-transition) .edit-form select,
html:not(.no-transition) .nav-search input,
html:not(.no-transition) .stat-card,
html:not(.no-transition) .nav-item,
html:not(.no-transition) .live-toggle {
  transition: background 0.65s ease, color 0.65s ease, border-color 0.65s ease, box-shadow 0.65s ease;
}

/* ═══════════════════════════════════════════════════════════════
   Accessibility: Skip Link
   ═══════════════════════════════════════════════════════════════ */
.skip-link {
  position: absolute;
  top: -100%;
  left: 16px;
  padding: 10px 20px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  border-radius: var(--radius-btn);
  z-index: 999;
  text-decoration: none;
  transition: top 0.2s;
}
.skip-link:focus { top: 12px; }

/* ═══════════════════════════════════════════════════════════════
   Accessibility: Screen Reader Only
   ═══════════════════════════════════════════════════════════════ */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap; border: 0;
}

/* ═══════════════════════════════════════════════════════════════
   Layout
   ═══════════════════════════════════════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
  flex-shrink: 0;
  z-index: 10;
  gap: 16px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.theme-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-btn);
  background: var(--glass-bg);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  font-size: 16px;
  flex-shrink: 0;
  overflow: hidden;
}
.theme-toggle .theme-icon {
  display: inline-block;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
}
.theme-toggle:active .theme-icon { transform: rotate(360deg) scale(0.8); }
.theme-toggle:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-hover); }
.theme-toggle:focus-visible { box-shadow: var(--focus-ring); outline: 2px solid var(--accent); outline-offset: 1px; }

.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

/* ═══════════════════════════════════════════════════════════════
   Live Update Toggle
   ═══════════════════════════════════════════════════════════════ */
.live-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  background: var(--glass-bg);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.live-toggle:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-hover); }
.live-toggle:focus-visible { box-shadow: var(--focus-ring); outline: 2px solid var(--accent); outline-offset: 1px; }
.live-toggle.active { border-color: var(--success); color: var(--success); }

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
  transition: background 0.3s;
}
.live-toggle.active .live-dot {
  background: var(--success);
  animation: livePulse 1.5s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4); }
  50% { box-shadow: 0 0 0 5px rgba(5, 150, 105, 0); }
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* ═══════════════════════════════════════════════════════════════
   Navigation Sidebar
   ═══════════════════════════════════════════════════════════════ */
.nav-sidebar {
  width: var(--nav-width);
  min-width: var(--nav-width);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--glass-border);
  backdrop-filter: blur(8px);
  background: var(--glass-bg);
  overflow: hidden;
}

.nav-menu {
  padding: 16px 12px 8px;
  flex-shrink: 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  margin-bottom: 4px;
  border-radius: var(--radius-btn);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  width: 100%;
  text-align: left;
  outline: none;
}
.nav-item:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
.nav-item:focus-visible { box-shadow: var(--focus-ring); outline: 2px solid var(--accent); outline-offset: 1px; }
.nav-item.active { background: var(--glass-bg-active); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.10); }

.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

.nav-arrow {
  margin-left: auto;
  font-size: 10px;
  transition: transform 0.25s ease;
  opacity: 0.5;
}
.nav-item.expanded .nav-arrow { transform: rotate(90deg); }

/* ── Sub-navigation (collapsible user list) ──────────── */
.nav-sub {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.nav-sub.expanded {
  max-height: 2000px;
  overflow-y: auto;
}

.nav-sub::-webkit-scrollbar { width: 4px; }
.nav-sub::-webkit-scrollbar-track { background: transparent; }
.nav-sub::-webkit-scrollbar-thumb { background: var(--glass-border-hover); border-radius: 4px; }

.nav-sub-inner {
  padding: 4px 12px 12px;
  flex: 1;
}

.nav-search {
  position: relative;
  margin-bottom: 10px;
}

.nav-search input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-btn);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 12px;
  outline: none;
  transition: var(--transition);
}
.nav-search input::placeholder { color: var(--text-muted); }
.nav-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12); background: var(--glass-bg-active); }

.nav-search svg {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--text-muted);
  pointer-events: none;
}

/* ── User cards in sidebar ───────────────────────────── */
.user-card {
  padding: 10px 12px;
  margin-bottom: 4px;
  border-radius: var(--radius-btn);
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: var(--transition);
  opacity: 0;
  transform: translateY(12px);
}
.user-card.revealed { opacity: 1; transform: translateY(0); }
.user-card:hover, .user-card:focus-visible { background: var(--glass-bg-hover); border-color: var(--glass-border-hover); }
.user-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.user-card.active { background: var(--glass-bg-active); border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.12); }

.user-id {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-on-glass);
  margin-bottom: 4px;
  word-break: break-all;
}

.user-badges {
  display: flex;
  gap: 6px;
  font-size: 10px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 1px 6px;
  border-radius: 20px;
  background: rgba(79, 70, 229, 0.08);
  color: var(--accent);
  font-weight: 500;
}
.badge.events { background: rgba(5, 150, 105, 0.08); color: var(--success); }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 14px; line-height: 1.5; }

/* ═══════════════════════════════════════════════════════════════
   Content Area (shared by overview & memory detail)
   ═══════════════════════════════════════════════════════════════ */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
}
.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-track { background: transparent; }
.content-area::-webkit-scrollbar-thumb { background: var(--glass-border-hover); border-radius: 6px; }

.page-panel { display: none; }
.page-panel.visible { display: block; }

/* ═══════════════════════════════════════════════════════════════
   Overview Page
   ═══════════════════════════════════════════════════════════════ */
.overview-title {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.overview-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 32px;
}

.overview-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: var(--glass-shadow);
  padding: 28px 24px;
  transition: var(--transition);
  text-align: center;
}
.stat-card:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-hover); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

.stat-icon { font-size: 32px; margin-bottom: 14px; display: block; }
.stat-number {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
  transition: color 0.3s;
}
.stat-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ═══════════════════════════════════════════════════════════════
   Memory Detail Page
   ═══════════════════════════════════════════════════════════════ */
.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.detail-user-id {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.section {
  margin-bottom: 28px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.section.revealed { opacity: 1; transform: translateY(0); }

.section-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .count {
  font-size: 11px;
  background: rgba(79, 70, 229, 0.08);
  color: var(--accent);
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 600;
}

/* Glass Card */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: var(--glass-shadow);
  padding: 18px 20px;
  margin-bottom: 10px;
  transition: var(--transition);
}
.glass-card:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-hover); }

/* Category group */
.cat-header {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  padding: 6px 12px;
  background: var(--glass-bg);
  border-radius: 8px;
  display: inline-block;
  margin-bottom: 12px;
}

.profile-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--glass-border);
  gap: 12px;
  min-height: 44px;
}
.profile-row:last-child { border-bottom: none; }

.profile-key { font-weight: 600; font-size: 13px; color: var(--text-on-glass); min-width: 100px; flex-shrink: 0; }
.profile-value { flex: 1; font-size: 13px; color: var(--text-on-glass); word-break: break-word; }
.confidence-dot { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; font-size: 12px; flex-shrink: 0; }

.profile-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.profile-row:hover .profile-actions, .profile-row:focus-within .profile-actions { opacity: 1; }
.profile-actions .btn:focus-visible { opacity: 1; }

/* Edit form */
.edit-form { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; flex: 1; }
.edit-form .field-row { display: flex; gap: 10px; align-items: center; }
.edit-form label { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 48px; }
.edit-form input, .edit-form select {
  flex: 1; padding: 7px 12px;
  border: 1px solid var(--glass-border); border-radius: var(--radius-input);
  background: var(--glass-bg); backdrop-filter: blur(8px);
  color: var(--text-primary); font-family: var(--font); font-size: 13px;
  outline: none; transition: var(--transition);
}
.edit-form input:focus, .edit-form select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12); }
.edit-form .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Timeline (Events) ─────────────────────────────────── */
.timeline { position: relative; padding-left: 24px; }
.timeline::before {
  content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px;
  width: 2px; background: linear-gradient(to bottom, rgba(79, 70, 229, 0.25), transparent); border-radius: 2px;
}
.event-row { position: relative; padding: 10px 0 10px 16px; display: flex; align-items: flex-start; gap: 12px; }
.event-row::before {
  content: ''; position: absolute; left: -20px; top: 16px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--glass-bg-active);
}
.event-time { font-size: 11px; color: var(--text-muted); min-width: 80px; flex-shrink: 0; padding-top: 2px; }
.event-summary { flex: 1; font-size: 13px; color: var(--text-on-glass); line-height: 1.4; word-break: break-word; }
.event-del { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
.event-row:hover .event-del, .event-row:focus-within .event-del { opacity: 1; }
.event-del:focus-visible { opacity: 1; }

/* ═══════════════════════════════════════════════════════════════
   Buttons
   ═══════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 16px; border: 1px solid transparent; border-radius: var(--radius-btn);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: var(--transition); outline: none; white-space: nowrap;
}
.btn:focus-visible { box-shadow: var(--focus-ring); outline: 2px solid var(--accent); outline-offset: 1px; }
.btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
.btn-primary:hover { background: #4338ca; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
.btn-ghost { background: var(--glass-bg); color: var(--text-on-glass); border-color: var(--glass-border); }
.btn-ghost:hover { background: var(--glass-bg-hover); }
.btn-danger { background: rgba(220, 38, 38, 0.08); color: var(--danger); border-color: rgba(220, 38, 38, 0.15); }
.btn-danger:hover { background: rgba(220, 38, 38, 0.15); }
.btn-danger:focus-visible { box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2); outline: 2px solid var(--danger); outline-offset: 1px; }
.btn-icon { width: 30px; height: 30px; padding: 0; border-radius: 10px; font-size: 14px; }

/* ═══════════════════════════════════════════════════════════════
   Modal
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--glass-bg-active); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border); border-radius: 16px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.20);
  padding: 28px 32px; max-width: 420px; width: 90%;
  transform: scale(0.95); transition: transform 0.2s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 22px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ═══════════════════════════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════════════════════════ */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 20px; border-radius: var(--radius-btn);
  background: var(--glass-bg-active); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
  font-size: 13px; font-weight: 500; color: var(--text-on-glass);
  animation: toastIn 0.3s ease; max-width: 360px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error   { border-left: 3px solid var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

/* ═══════════════════════════════════════════════════════════════
   Loading Spinner
   ═══════════════════════════════════════════════════════════════ */
.spinner { width: 28px; height: 28px; border: 3px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════════════
   Scrollbar Global
   ═══════════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--glass-border-hover); border-radius: 6px; }

/* ═══════════════════════════════════════════════════════════════
   Add / Create Buttons & Inline Forms
   ═══════════════════════════════════════════════════════════════ */
.add-user-btn { width: 100%; margin: 6px 0; font-size: 13px; }
.section-title-row { display: flex; align-items: center; gap: 10px; }
.section-title-row .section-title { margin: 0; flex: 1; }
.section-title-row .btn { flex-shrink: 0; font-size: 12px; padding: 4px 12px; }
.add-inline-form {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-card); padding: 16px; margin-bottom: 12px;
}
.add-inline-form .field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.add-inline-form .field-row label { min-width: 52px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
.add-inline-form .field-row input,
.add-inline-form .field-row select { flex: 1; padding: 6px 10px; font-size: 13px; border: 1px solid var(--glass-border); border-radius: var(--radius-btn); background: var(--glass-bg); color: var(--text-on-glass); font-family: var(--font); outline: none; }
.add-inline-form .field-row input:focus,
.add-inline-form .field-row select:focus { border-color: var(--accent); box-shadow: var(--focus-ring); }
.add-inline-form .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.event-edit-input {
  flex: 1; padding: 4px 8px; font-size: 13px;
  border: 1px solid var(--accent); border-radius: var(--radius-btn);
  background: var(--glass-bg); color: var(--text-on-glass);
  font-family: var(--font); outline: none;
}
.event-actions { display: flex; gap: 4px; flex-shrink: 0; }
.event-row:hover .event-actions .btn-icon,
.event-row:focus-within .event-actions .btn-icon { opacity: 1; }
.event-actions .btn-icon { opacity: 0; transition: opacity 0.15s; }
.event-actions .btn-icon:focus-visible { opacity: 1; }

/* ═══════════════════════════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .nav-sidebar { width: 100%; min-width: 0; max-height: 45vh; border-right: none; border-bottom: 1px solid var(--glass-border); }
  .nav-sub.expanded { max-height: 300px; }
  .content-area { padding: 16px; }
  .overview-stats { grid-template-columns: 1fr; }
  .stat-card { padding: 20px 16px; }
  .stat-number { font-size: 32px; }
}

/* ═══════════════════════════════════════════════════════════════
   Accessibility: Reduced Motion
   ═══════════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important; scroll-behavior: auto !important;
  }
  .user-card { opacity: 1; transform: none; }
  .section { opacity: 1; transform: none; }
}

/* ═══════════════════════════════════════════════════════════════
   Accessibility: High Contrast Mode
   ═══════════════════════════════════════════════════════════════ */
@media (forced-colors: active) {
  .btn { border: 2px solid ButtonText; }
  .user-card { border: 1px solid ButtonText; }
  .user-card.active { border: 2px solid Highlight; }
  .nav-item.active { border: 2px solid Highlight; }
  .glass-card { border: 1px solid ButtonText; }
  .stat-card { border: 1px solid ButtonText; }
  .modal { border: 2px solid ButtonText; }
  .toast { border: 2px solid ButtonText; }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Skip Link -->
  <a class="skip-link" href="#contentArea">跳过导航，直接查看内容</a>

  <!-- Header -->
  <header class="header" role="banner">
    <h1>✦ KiraOS WebUI</h1>
    <div class="header-right">
      <button class="live-toggle active" id="liveToggle" onclick="toggleLiveUpdate()" title="切换实时更新" aria-label="实时更新已开启">
        <span class="live-dot"></span>
        <span id="liveLabel">实时更新：开</span>
      </button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换明暗模式" aria-label="切换明暗模式">
        <span class="theme-icon" id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <!-- Main -->
  <div class="main">
    <!-- Navigation Sidebar -->
    <nav class="nav-sidebar" id="navSidebar" aria-label="导航菜单">
      <div class="nav-menu">
        <button class="nav-item active" id="navOverview" onclick="navigateTo('overview')" aria-current="page">
          <span class="nav-icon">📊</span> 概览
        </button>
        <button class="nav-item" id="navMemory" onclick="toggleMemoryNav()" aria-expanded="false" aria-controls="navSub">
          <span class="nav-icon">🧠</span> 记忆管理
          <span class="nav-arrow">▶</span>
        </button>
      </div>
      <div class="nav-sub" id="navSub" aria-hidden="true">
        <div class="nav-sub-inner">
          <div class="nav-search" role="search">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <label for="searchInput" class="sr-only">搜索用户 ID</label>
            <input type="text" id="searchInput" placeholder="搜索用户 ..." oninput="filterUsers()" autocomplete="off">
          </div>
          <button class="btn btn-ghost add-user-btn" onclick="showCreateUserDialog()" aria-label="新建用户">＋ 新建用户</button>
          <div id="userList" role="list" aria-label="用户列表"></div>
        </div>
      </div>
    </nav>

    <!-- Content Area -->
    <main class="content-area" id="contentArea">
      <!-- Live region for status announcements -->
      <div id="statusLive" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <!-- Overview Page -->
      <div class="page-panel visible" id="overviewPanel">
        <h2 class="overview-title">概览</h2>
        <p class="overview-subtitle">KiraOS 记忆系统运行状态总览</p>
        <div class="overview-stats" id="overviewStats">
          <div class="stat-card">
            <span class="stat-icon">👥</span>
            <div class="stat-number" id="statUsers">—</div>
            <div class="stat-label">累计用户</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">📋</span>
            <div class="stat-number" id="statProfiles">—</div>
            <div class="stat-label">画像记录</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">📅</span>
            <div class="stat-number" id="statEvents">—</div>
            <div class="stat-label">事件记录</div>
          </div>
        </div>
      </div>

      <!-- Memory Detail Page -->
      <div class="page-panel" id="memoryPanel">
        <div class="empty-state" id="emptyState" role="status">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-4 7l-3 3.5L9 16c-2-1.5-4-4-4-7a7 7 0 0 1 7-7z"/>
            <circle cx="12" cy="9" r="2"/>
          </svg>
          <p>选择一个用户查看记忆数据<br><span style="font-size:12px;opacity:0.6;">左侧列表展示所有有记忆记录的用户</span></p>
        </div>
        <div id="detailContent" style="display:none;"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)" role="presentation">
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
      <h3 id="modalTitle">确认操作</h3>
      <p id="modalMessage">确定要执行此操作吗？</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-danger" id="modalConfirmBtn" onclick="confirmModal()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════════════════ */
let allUsers = [];
let selectedUserId = null;
let userData = null;
let editingKey = null;
let modalCallback = null;
let _selectRequestId = 0;
let currentPage = 'overview';       // 'overview' | 'memory'
let memoryNavExpanded = false;
let liveUpdateEnabled = true;
let _liveTimer = null;
let _liveUpdating = false;
const LIVE_INTERVAL = 1000;
let _lastUsersJson = '';
let _lastUserDataJson = '';
let addingProfile = false;
let addingEvent = false;
let editingEventId = null;

/* ═══════════════════════════════════════════════════════════════
   API Helpers
   ═══════════════════════════════════════════════════════════════ */
function getToken() {
  const stored = sessionStorage.getItem('kiraos_token');
  if (stored !== null) return stored;
  const params = new URLSearchParams(location.search);
  const token = params.get('token') || '';
  sessionStorage.setItem('kiraos_token', token);
  if (params.has('token')) {
    params.delete('token');
    const qs = params.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
  }
  return token;
}

async function api(path, opts = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch('/api' + path, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

/* ═══════════════════════════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════════════════════════ */
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  // Announce to dedicated live region for screen readers
  const live = document.getElementById('statusLive');
  if (live) live.textContent = message;
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(30px)'; toast.style.transition = '0.3s'; }, 2500);
  setTimeout(() => toast.remove(), 2800);
}

/* ═══════════════════════════════════════════════════════════════
   Modal
   ═══════════════════════════════════════════════════════════════ */
let _previousFocus = null;

function showModal(title, message, callback) {
  _previousFocus = document.activeElement;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMessage').textContent = message;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('show');
  modalCallback = callback;
  setTimeout(() => {
    const firstBtn = overlay.querySelector('.modal .btn');
    if (firstBtn) firstBtn.focus();
  }, 100);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('show');
  modalCallback = null;
  if (_previousFocus) { _previousFocus.focus(); _previousFocus = null; }
}

function confirmModal() {
  if (modalCallback) modalCallback();
  document.getElementById('modalOverlay').classList.remove('show');
  modalCallback = null;
  if (_previousFocus) { _previousFocus.focus(); _previousFocus = null; }
}

document.addEventListener('keydown', function(e) {
  const overlay = document.getElementById('modalOverlay');
  if (!overlay.classList.contains('show')) return;
  if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
  if (e.key === 'Tab') {
    const focusable = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
  }
});

/* ═══════════════════════════════════════════════════════════════
   Scroll Reveal (IntersectionObserver)
   ═══════════════════════════════════════════════════════════════ */
function setupReveal(container) {
  if (!container) return;
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('revealed'), i * 60);
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.08, root: container }
  );
  container.querySelectorAll('.user-card, .section').forEach(el => observer.observe(el));
}

/* ═══════════════════════════════════════════════════════════════
   Navigation
   ═══════════════════════════════════════════════════════════════ */
function navigateTo(page) {
  currentPage = page;
  // Update nav active states
  document.getElementById('navOverview').classList.toggle('active', page === 'overview');
  document.getElementById('navOverview').setAttribute('aria-current', page === 'overview' ? 'page' : 'false');

  // Show/hide panels
  document.getElementById('overviewPanel').classList.toggle('visible', page === 'overview');
  document.getElementById('memoryPanel').classList.toggle('visible', page === 'memory');

  // If navigating to overview, collapse memory nav highlight (keep expanded though)
  if (page === 'overview') {
    document.getElementById('navMemory').classList.remove('active');
    loadStats();
  } else {
    document.getElementById('navMemory').classList.add('active');
  }
}

function toggleMemoryNav() {
  memoryNavExpanded = !memoryNavExpanded;
  const sub = document.getElementById('navSub');
  const btn = document.getElementById('navMemory');
  sub.classList.toggle('expanded', memoryNavExpanded);
  btn.classList.toggle('expanded', memoryNavExpanded);
  btn.setAttribute('aria-expanded', String(memoryNavExpanded));
  sub.setAttribute('aria-hidden', String(!memoryNavExpanded));

  // Switch to memory page when expanding
  if (memoryNavExpanded) {
    // Reset selection — show empty state
    selectedUserId = null;
    userData = null;
    _lastUserDataJson = '';
    document.getElementById('detailContent').style.display = 'none';
    document.getElementById('emptyState').style.display = '';
    document.querySelectorAll('.user-card').forEach(c => {
      c.classList.remove('active');
      c.setAttribute('aria-current', 'false');
    });
    navigateTo('memory');
    if (allUsers.length === 0) loadUsers();
  }
}

/* ═══════════════════════════════════════════════════════════════
   Overview — Stats
   ═══════════════════════════════════════════════════════════════ */
async function loadStats() {
  try {
    const stats = await api('/stats');
    document.getElementById('statUsers').textContent = stats.total_users;
    document.getElementById('statProfiles').textContent = stats.total_profiles;
    document.getElementById('statEvents').textContent = stats.total_events;
  } catch (e) {
    // silently fail for live updates; show error only on first load
    const el = document.getElementById('statUsers');
    if (el.textContent === '—') {
      document.getElementById('statUsers').textContent = '!';
      document.getElementById('statProfiles').textContent = '!';
      document.getElementById('statEvents').textContent = '!';
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   Load Users
   ═══════════════════════════════════════════════════════════════ */
async function loadUsers() {
  const listEl = document.getElementById('userList');
  // Only show spinner on initial load (when list is empty)
  if (allUsers.length === 0) {
    listEl.innerHTML = '<div class="spinner" role="status" aria-label="加载中"><span class="sr-only">正在加载用户列表…</span></div>';
  }
  try {
    allUsers = await api('/users');
    _lastUsersJson = JSON.stringify(allUsers);
    renderUsers(allUsers);
  } catch (e) {
    if (allUsers.length === 0) {
      listEl.innerHTML = '<div class="empty-state" role="alert"><p>加载失败: ' + escapeHtml(e.message) + '</p></div>';
    }
  }
}

function filterUsers() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? allUsers.filter(u => u.user_id.toLowerCase().includes(q)) : allUsers;
  renderUsers(filtered);
}

function renderUsers(users) {
  const listEl = document.getElementById('userList');
  if (!users.length) {
    listEl.innerHTML = '<div class="empty-state" role="status"><p>暂无记忆数据</p></div>';
    return;
  }
  listEl.innerHTML = users.map(u => `
    <div class="user-card ${selectedUserId === u.user_id ? 'active' : ''}"
         role="listitem" tabindex="0"
         data-uid="${escapeAttr(u.user_id)}"
         aria-label="用户 ${escapeAttr(u.user_id)}，${u.profile_count} 条画像，${u.event_count} 条事件"
         aria-current="${selectedUserId === u.user_id ? 'true' : 'false'}">
      <div class="user-id">${escapeHtml(u.user_id)}</div>
      <div class="user-badges">
        <span class="badge" aria-hidden="true">📋 ${u.profile_count}</span>
        <span class="badge events" aria-hidden="true">📅 ${u.event_count}</span>
      </div>
    </div>
  `).join('');
  setupReveal(document.getElementById('navSub'));
}

function handleCardKey(e, userId) {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectUser(userId); }
}

// Event delegation for user cards (avoids inline handlers with user data)
(function() {
  const listEl = document.getElementById('userList');
  listEl.addEventListener('click', function(e) {
    const card = e.target.closest('.user-card');
    if (card && card.dataset.uid) selectUser(card.dataset.uid);
  });
  listEl.addEventListener('keydown', function(e) {
    const card = e.target.closest('.user-card');
    if (card && card.dataset.uid) handleCardKey(e, card.dataset.uid);
  });
})();

/* ═══════════════════════════════════════════════════════════════
   Select User
   ═══════════════════════════════════════════════════════════════ */
async function selectUser(userId) {
  selectedUserId = userId;
  editingKey = null;
  const localRequestId = ++_selectRequestId;

  // Ensure we're on memory page
  if (currentPage !== 'memory') navigateTo('memory');

  // Update sidebar active state
  document.querySelectorAll('.user-card').forEach(c => {
    const isActive = c.dataset.uid === userId;
    c.classList.toggle('active', isActive);
    c.setAttribute('aria-current', isActive ? 'true' : 'false');
  });

  document.getElementById('emptyState').style.display = 'none';
  const content = document.getElementById('detailContent');
  content.style.display = 'block';
  content.innerHTML = '<div class="spinner" role="status" aria-label="加载中"><span class="sr-only">正在加载用户数据…</span></div>';

  try {
    const data = await api('/users/' + encodeURIComponent(userId));
    if (localRequestId !== _selectRequestId) return;
    userData = data;
    _lastUserDataJson = JSON.stringify(data);
    renderDetail();
  } catch (e) {
    if (localRequestId !== _selectRequestId) return;
    content.innerHTML = '<div class="empty-state" role="alert"><p>加载失败: ' + escapeHtml(e.message) + '</p></div>';
  }
}

/* Silently refresh selected user data (for live update, no spinner) */
async function refreshSelectedUser() {
  if (!selectedUserId || editingKey || addingProfile || addingEvent || editingEventId !== null) return;
  const capturedId = selectedUserId;
  try {
    const data = await api('/users/' + encodeURIComponent(capturedId));
    if (capturedId !== selectedUserId) return;
    const dataJson = JSON.stringify(data);
    if (dataJson !== _lastUserDataJson) {
      _lastUserDataJson = dataJson;
      userData = data;
      renderDetail();
    }
  } catch (_) { /* silently ignore */ }
}

/* ═══════════════════════════════════════════════════════════════
   Render Detail
   ═══════════════════════════════════════════════════════════════ */
function renderDetail() {
  if (!userData) return;
  const { user_id, profiles, events } = userData;

  const groups = {};
  const categoryOrder = ['basic', 'preference', 'social', 'other'];
  profiles.forEach(p => {
    if (!groups[p.category]) groups[p.category] = [];
    groups[p.category].push(p);
  });

  const confMark = c => c >= 0.8 ? '✓' : c >= 0.5 ? '?' : '~';
  const confColor = c => c >= 0.8 ? '#047857' : c >= 0.5 ? '#b45309' : '#dc2626';
  const confLabel = c => c >= 0.8 ? '高置信度' : c >= 0.5 ? '中置信度' : '低置信度';

  let profileHtml = '';
  categoryOrder.forEach(cat => {
    const items = groups[cat];
    if (!items) return;
    profileHtml += `<div class="glass-card section">
      <div class="cat-header">${escapeHtml(cat)}</div>`;
    items.forEach(p => {
      if (editingKey === p.key) {
        profileHtml += renderEditForm(p);
      } else {
        profileHtml += `
        <div class="profile-row">
          <span class="profile-key">${escapeHtml(p.key)}</span>
          <span class="profile-value">${escapeHtml(p.value)}</span>
          <span class="confidence-dot" style="color:${confColor(p.confidence)}" title="置信度: ${p.confidence}" aria-label="${confLabel(p.confidence)}: ${p.confidence}">${confMark(p.confidence)}</span>
          <div class="profile-actions">
            <button class="btn btn-icon btn-ghost" onclick="startEdit('${escapeAttr(p.key)}')" title="编辑" aria-label="编辑画像 ${escapeAttr(p.key)}">✎</button>
            <button class="btn btn-icon btn-danger" onclick="deleteProfile('${escapeAttr(p.key)}')" title="删除" aria-label="删除画像 ${escapeAttr(p.key)}">×</button>
          </div>
        </div>`;
      }
    });
    profileHtml += '</div>';
  });

  let eventHtml = '';
  if (events.length || addingEvent) {
    eventHtml = '<div class="glass-card section"><div class="timeline">';
    if (addingEvent) {
      eventHtml += `
      <div class="add-inline-form" role="form" aria-label="添加事件">
        <div class="field-row">
          <label for="new-event-summary">内容</label>
          <input type="text" id="new-event-summary" placeholder="事件描述…" aria-required="true">
        </div>
        <div class="edit-actions">
          <button class="btn btn-ghost" onclick="cancelAddEvent()">取消</button>
          <button class="btn btn-primary" onclick="saveNewEvent()">保存</button>
        </div>
      </div>`;
    }
    events.forEach(ev => {
      const time = ev.created_at ? ev.created_at.substring(0, 16).replace('T', ' ') : '';
      if (editingEventId === ev.id) {
        eventHtml += `
        <div class="event-row">
          <span class="event-time">${escapeHtml(time)}</span>
          <input class="event-edit-input" id="edit-event-${ev.id}" value="${escapeAttr(ev.event_summary)}" aria-label="编辑事件内容">
          <div class="event-actions" style="opacity:1;">
            <button class="btn btn-icon btn-ghost" onclick="cancelEditEvent()" title="取消" aria-label="取消编辑">✕</button>
            <button class="btn btn-icon btn-primary" onclick="saveEditEvent(${ev.id})" title="保存" aria-label="保存事件">✓</button>
          </div>
        </div>`;
      } else {
        eventHtml += `
        <div class="event-row">
          <span class="event-time">${escapeHtml(time)}</span>
          <span class="event-summary">${escapeHtml(ev.event_summary)}</span>
          <div class="event-actions">
            <button class="btn btn-icon btn-ghost" onclick="startEditEvent(${ev.id})" title="编辑事件" aria-label="编辑事件: ${escapeAttr(ev.event_summary)}">✎</button>
            <button class="btn btn-icon btn-danger" onclick="deleteEvent(${ev.id})" title="删除事件" aria-label="删除事件: ${escapeAttr(ev.event_summary)}">×</button>
          </div>
        </div>`;
      }
    });
    eventHtml += '</div></div>';
  }

  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <div class="detail-header">
      <h2 class="detail-user-id">${escapeHtml(user_id)}</h2>
      <button class="btn btn-danger" onclick="clearAllMemory()" aria-label="清除 ${escapeAttr(user_id)} 的全部记忆">🗑 清除全部记忆</button>
    </div>
    <div class="section-title-row">
      <h3 class="section-title">画像 <span class="count" aria-label="${profiles.length} 条画像">${profiles.length}</span></h3>
      <button class="btn btn-ghost" onclick="startAddProfile()" aria-label="添加画像">＋ 添加画像</button>
    </div>
    ${addingProfile ? renderAddProfileForm() : ''}
    ${profileHtml || '<div class="glass-card section" role="status"><div class="empty-state" style="padding:24px"><p>暂无画像数据</p></div></div>'}
    <div class="section-title-row" style="margin-top:8px;">
      <h3 class="section-title">事件 <span class="count" aria-label="${events.length} 条事件">${events.length}</span></h3>
      <button class="btn btn-ghost" onclick="startAddEvent()" aria-label="添加事件">＋ 添加事件</button>
    </div>
    ${eventHtml || '<div class="glass-card section" role="status"><div class="empty-state" style="padding:24px"><p>暂无事件记录</p></div></div>'}
  `;
  setupReveal(document.getElementById('contentArea'));
}

function renderEditForm(p) {
  return `
  <div class="profile-row" style="flex-direction:column;align-items:stretch;" role="form" aria-label="编辑画像 ${escapeAttr(p.key)}">
    <div class="profile-key" style="margin-bottom:8px;">${escapeHtml(p.key)}</div>
    <div class="edit-form">
      <div class="field-row">
        <label for="edit-value">值</label>
        <input type="text" id="edit-value" value="${escapeAttr(p.value)}" aria-required="true">
      </div>
      <div class="field-row">
        <label for="edit-conf">置信度</label>
        <input type="range" id="edit-conf" min="0" max="1" step="0.1" value="${p.confidence}" style="flex:1" aria-valuemin="0" aria-valuemax="1" aria-valuenow="${p.confidence}" oninput="document.getElementById('conf-display').textContent=this.value; this.setAttribute('aria-valuenow', this.value)">
        <span id="conf-display" style="min-width:28px;text-align:center;font-size:12px;" aria-hidden="true">${p.confidence}</span>
      </div>
      <div class="field-row">
        <label for="edit-cat">分类</label>
        <select id="edit-cat">
          ${['basic','preference','social','other'].map(c => `<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="edit-actions">
        <button class="btn btn-ghost" onclick="cancelEdit()">取消</button>
        <button class="btn btn-primary" onclick="saveEdit('${escapeAttr(p.key)}')">保存</button>
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   Inline Edit
   ═══════════════════════════════════════════════════════════════ */
function startEdit(key) { editingKey = key; renderDetail(); }
function cancelEdit() { editingKey = null; renderDetail(); }

async function saveEdit(key) {
  const value = document.getElementById('edit-value').value.trim();
  const confidence = parseFloat(document.getElementById('edit-conf').value);
  const category = document.getElementById('edit-cat').value;
  if (!value) { showToast('值不能为空', 'error'); return; }
  try {
    await api('/users/' + encodeURIComponent(selectedUserId) + '/profiles/' + encodeURIComponent(key), {
      method: 'PUT', body: JSON.stringify({ value, confidence, category })
    });
    showToast('画像已更新');
    editingKey = null;
    await selectUser(selectedUserId);
    await loadUsers();
  } catch (e) { showToast('更新失败: ' + e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════
   Create User
   ═══════════════════════════════════════════════════════════════ */
function showCreateUserDialog() {
  const userId = prompt('请输入新用户 ID：');
  if (!userId || !userId.trim()) return;
  const trimmed = userId.trim();
  // Add to sidebar if not already present
  if (!allUsers.find(u => u.user_id === trimmed)) {
    allUsers.push({ user_id: trimmed, profile_count: 0, event_count: 0 });
    _lastUsersJson = JSON.stringify(allUsers);
    filterUsers();
  }
  // Switch to memory page first so detail panel is visible
  if (currentPage !== 'memory') navigateTo('memory');
  // Create empty userData for the new user and select it
  selectedUserId = trimmed;
  userData = { user_id: trimmed, profiles: [], events: [] };
  _lastUserDataJson = JSON.stringify(userData);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detailContent').style.display = 'block';
  renderDetail();
  // Highlight the card
  document.querySelectorAll('.user-card').forEach(c => {
    const isActive = c.dataset.uid === trimmed;
    c.classList.toggle('active', isActive);
    c.setAttribute('aria-current', isActive ? 'true' : 'false');
  });
}

/* ═══════════════════════════════════════════════════════════════
   Add Profile
   ═══════════════════════════════════════════════════════════════ */
function renderAddProfileForm() {
  return `
  <div class="add-inline-form glass-card section" role="form" aria-label="添加画像">
    <div class="field-row">
      <label for="new-profile-key">键</label>
      <input type="text" id="new-profile-key" placeholder="如：喜欢的颜色" aria-required="true">
    </div>
    <div class="field-row">
      <label for="new-profile-value">值</label>
      <input type="text" id="new-profile-value" placeholder="如：蓝色" aria-required="true">
    </div>
    <div class="field-row">
      <label for="new-profile-conf">置信度</label>
      <input type="range" id="new-profile-conf" min="0" max="1" step="0.1" value="0.5" style="flex:1"
        oninput="document.getElementById('new-conf-display').textContent=this.value">
      <span id="new-conf-display" style="min-width:28px;text-align:center;font-size:12px;">0.5</span>
    </div>
    <div class="field-row">
      <label for="new-profile-cat">分类</label>
      <select id="new-profile-cat">
        <option value="basic">basic</option>
        <option value="preference" selected>preference</option>
        <option value="social">social</option>
        <option value="other">other</option>
      </select>
    </div>
    <div class="edit-actions">
      <button class="btn btn-ghost" onclick="cancelAddProfile()">取消</button>
      <button class="btn btn-primary" onclick="saveNewProfile()">保存</button>
    </div>
  </div>`;
}

function startAddProfile() { addingProfile = true; renderDetail(); }
function cancelAddProfile() { addingProfile = false; renderDetail(); }

async function saveNewProfile() {
  const key = document.getElementById('new-profile-key').value.trim();
  const value = document.getElementById('new-profile-value').value.trim();
  const confidence = parseFloat(document.getElementById('new-profile-conf').value);
  const category = document.getElementById('new-profile-cat').value;
  if (!key) { showToast('键不能为空', 'error'); return; }
  if (!value) { showToast('值不能为空', 'error'); return; }
  try {
    await api('/users/' + encodeURIComponent(selectedUserId) + '/profiles/' + encodeURIComponent(key), {
      method: 'PUT', body: JSON.stringify({ value, confidence, category })
    });
    showToast('画像已添加');
    addingProfile = false;
    await selectUser(selectedUserId);
    await loadUsers();
  } catch (e) { showToast('添加失败: ' + e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════
   Add Event
   ═══════════════════════════════════════════════════════════════ */
function startAddEvent() { addingEvent = true; renderDetail(); }
function cancelAddEvent() { addingEvent = false; renderDetail(); }

async function saveNewEvent() {
  const summary = document.getElementById('new-event-summary').value.trim();
  if (!summary) { showToast('事件内容不能为空', 'error'); return; }
  try {
    await api('/users/' + encodeURIComponent(selectedUserId) + '/events', {
      method: 'POST', body: JSON.stringify({ event_summary: summary })
    });
    showToast('事件已添加');
    addingEvent = false;
    await selectUser(selectedUserId);
    await loadUsers();
  } catch (e) { showToast('添加失败: ' + e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════
   Edit Event (inline)
   ═══════════════════════════════════════════════════════════════ */
function startEditEvent(id) { editingEventId = id; renderDetail(); }
function cancelEditEvent() { editingEventId = null; renderDetail(); }

async function saveEditEvent(id) {
  const input = document.getElementById('edit-event-' + id);
  const summary = input ? input.value.trim() : '';
  if (!summary) { showToast('事件内容不能为空', 'error'); return; }
  try {
    await api('/users/' + encodeURIComponent(selectedUserId) + '/events/' + id, {
      method: 'PUT', body: JSON.stringify({ event_summary: summary })
    });
    showToast('事件已更新');
    editingEventId = null;
    await selectUser(selectedUserId);
  } catch (e) { showToast('更新失败: ' + e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════
   Delete Operations
   ═══════════════════════════════════════════════════════════════ */
function deleteProfile(key) {
  showModal('删除画像', `确定要删除画像 "${key}" 吗？此操作不可撤销。`, async () => {
    try {
      await api('/users/' + encodeURIComponent(selectedUserId) + '/profiles/' + encodeURIComponent(key), { method: 'DELETE' });
      showToast('画像已删除');
      await selectUser(selectedUserId);
      await loadUsers();
    } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
  });
}

function deleteEvent(eventId) {
  showModal('删除事件', '确定要删除此事件记录吗？', async () => {
    try {
      await api('/users/' + encodeURIComponent(selectedUserId) + '/events/' + eventId, { method: 'DELETE' });
      showToast('事件已删除');
      await selectUser(selectedUserId);
      await loadUsers();
    } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
  });
}

function clearAllMemory() {
  showModal(
    '⚠ 清除全部记忆',
    `即将删除用户 "${selectedUserId}" 的所有画像和事件记录。此操作不可恢复！`,
    async () => {
      try {
        const res = await api('/users/' + encodeURIComponent(selectedUserId), { method: 'DELETE' });
        showToast(`已清除: ${res.profiles_deleted} 条画像, ${res.events_deleted} 条事件`);
        selectedUserId = null;
        userData = null;
        document.getElementById('detailContent').style.display = 'none';
        document.getElementById('emptyState').style.display = '';
        await loadUsers();
      } catch (e) { showToast('清除失败: ' + e.message, 'error'); }
    }
  );
}

/* ═══════════════════════════════════════════════════════════════
   Live Update
   ═══════════════════════════════════════════════════════════════ */
function toggleLiveUpdate() {
  liveUpdateEnabled = !liveUpdateEnabled;
  const btn = document.getElementById('liveToggle');
  const label = document.getElementById('liveLabel');
  btn.classList.toggle('active', liveUpdateEnabled);
  label.textContent = liveUpdateEnabled ? '实时更新：开' : '实时更新：关';
  btn.setAttribute('aria-label', liveUpdateEnabled ? '实时更新已开启' : '实时更新已关闭');
  if (liveUpdateEnabled) startLiveUpdate(); else stopLiveUpdate();
}

function startLiveUpdate() {
  stopLiveUpdate();
  _liveTimer = setInterval(doLiveUpdate, LIVE_INTERVAL);
}

function stopLiveUpdate() {
  if (_liveTimer) { clearInterval(_liveTimer); _liveTimer = null; }
}

async function doLiveUpdate() {
  if (_liveUpdating) return;
  _liveUpdating = true;
  try {
    // Always refresh stats
    await loadStats();

    // Refresh user list if memory nav is expanded
    if (memoryNavExpanded) {
      try {
        const users = await api('/users');
        const usersJson = JSON.stringify(users);
        if (usersJson !== _lastUsersJson) {
          _lastUsersJson = usersJson;
          allUsers = users;
          const q = document.getElementById('searchInput').value.trim().toLowerCase();
          const filtered = q ? allUsers.filter(u => u.user_id.toLowerCase().includes(q)) : allUsers;
          renderUsers(filtered);
        }
      } catch (_) {}
    }

    // Refresh selected user detail (skip if editing)
    if (selectedUserId && currentPage === 'memory' && !editingKey && !addingProfile && !addingEvent && editingEventId === null) {
      await refreshSelectedUser();
    }
  } catch (_) {}
  _liveUpdating = false;
}

/* ═══════════════════════════════════════════════════════════════
   Helpers
   ═══════════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeAttr(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ═══════════════════════════════════════════════════════════════
   Theme Toggle
   ═══════════════════════════════════════════════════════════════ */
function getPreferredTheme() {
  const stored = localStorage.getItem('kiraos-theme');
  if (stored === 'dark' || stored === 'light') return stored;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme, animate) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (animate) {
    icon.style.transform = 'rotate(360deg) scale(0)';
    icon.style.opacity = '0';
    setTimeout(() => {
      icon.textContent = theme === 'dark' ? '☀️' : '🌙';
      icon.style.transform = 'rotate(0deg) scale(1)';
      icon.style.opacity = '1';
    }, 200);
  } else {
    icon.textContent = theme === 'dark' ? '☀️' : '🌙';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || getPreferredTheme();
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('kiraos-theme', next);
  applyTheme(next, true);
}

// Apply on load — suppress transition to avoid flash
document.documentElement.classList.add('no-transition');
applyTheme(getPreferredTheme(), false);
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    document.documentElement.classList.remove('no-transition');
  });
});

/* ═══════════════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════════════ */
loadStats();
loadUsers();
if (liveUpdateEnabled) startLiveUpdate();
</script>
