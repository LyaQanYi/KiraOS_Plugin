<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KiraOS Memory</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel2: #232733;
    --border: #2a2f3a;
    --fg: #e5e7eb;
    --muted: #8b919e;
    --accent: #4ea4ff;
    --warn: #f0a050;
    --danger: #e25656;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--fg);
    height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { font-size: 16px; margin: 0; }
  .stat { font-size: 13px; color: var(--muted); }
  .stat strong { color: var(--fg); }
  .lang-select {
    background: var(--panel2); color: var(--fg);
    border: 1px solid var(--border); padding: 4px 8px;
    border-radius: 4px; font-size: 12px;
  }
  main {
    display: grid; grid-template-columns: 320px 1fr;
    height: calc(100vh - 49px);
  }
  aside {
    border-right: 1px solid var(--border);
    overflow-y: auto; background: var(--panel);
  }
  .toolbar {
    display: flex; gap: 8px; padding: 10px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar input, .toolbar select {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--fg); padding: 6px 8px; border-radius: 4px;
    font-size: 13px; flex: 1;
  }
  .entity-row {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; font-size: 13px;
  }
  .entity-row:hover { background: var(--panel2); }
  .entity-row.active { background: var(--panel2); border-left: 3px solid var(--accent); }
  .entity-row .name { font-weight: 500; }
  .entity-row .id { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .entity-row .counts { color: var(--muted); font-size: 11px; }
  section.detail { overflow-y: auto; padding: 16px 24px; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .panel { background: var(--panel); border-radius: 6px; padding: 14px 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 14px; margin: 0 0 10px; color: var(--accent); }
  .profile pre { margin: 0; white-space: pre-wrap; font-family: inherit; font-size: 13px; }
  .memory {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 12px; margin-bottom: 8px;
    font-size: 13px;
  }
  .memory .meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .memory .tag { background: var(--border); padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
  .memory .actions { margin-top: 6px; display: flex; gap: 6px; }
  button {
    background: var(--accent); color: white; border: none;
    padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px;
  }
  button.warn { background: var(--warn); }
  button.danger { background: var(--danger); }
  button:hover { opacity: 0.85; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .modal {
    background: var(--panel); padding: 20px;
    border-radius: 6px; min-width: 420px; max-width: 90%;
  }
  .modal h3 { margin: 0 0 12px; font-size: 14px; }
  .modal textarea {
    width: 100%; min-height: 100px; background: var(--panel2);
    color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px; font-family: inherit; font-size: 13px;
  }
  .modal label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
  .modal input {
    background: var(--panel2); color: var(--fg);
    border: 1px solid var(--border); padding: 6px 8px;
    border-radius: 4px; font-size: 13px; width: 100%;
  }
  .modal .footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
</style>
</head>
<body>
<header>
  <h1 data-i18n="app.title">KiraOS Memory</h1>
  <span class="stat"><span data-i18n="stats.entities">Entities</span> <strong id="stat-entities">-</strong></span>
  <span class="stat"><span data-i18n="stats.facts">Facts</span> <strong id="stat-facts">-</strong></span>
  <span class="stat"><span data-i18n="stats.reflections">Reflections</span> <strong id="stat-reflections">-</strong></span>
  <span class="stat"><span data-i18n="stats.vector">Vector</span> <strong id="stat-vec">-</strong></span>
  <span style="flex:1"></span>
  <select id="lang-select" class="lang-select" aria-label="Language">
    <option value="en">English</option>
    <option value="zh">中文</option>
  </select>
  <button class="warn" id="gc-btn" data-i18n="buttons.run_gc">Run GC</button>
</header>
<main>
  <aside>
    <div class="toolbar">
      <input id="search-input" data-i18n-attr="placeholder:search.placeholder" placeholder="Search memories…" />
      <select id="type-filter">
        <option value="" data-i18n="filter.all_types">All types</option>
        <option value="user">user</option>
        <option value="group">group</option>
        <option value="channel">channel</option>
      </select>
    </div>
    <div id="entity-list"></div>
  </aside>
  <section class="detail" id="detail">
    <div class="empty" data-i18n="detail.empty_hint">Select an entity on the left to view its profile and memories</div>
  </section>
</main>

<script>
(function () {
  // ── i18n dictionary ───────────────────────────────────────────────
  const I18N = {
    en: {
      app: { title: "KiraOS Memory" },
      stats: { entities: "Entities", facts: "Facts", reflections: "Reflections", vector: "Vector" },
      buttons: { run_gc: "Run GC", edit: "Edit", archive: "Archive", cancel: "Cancel", save: "Save" },
      filter: { all_types: "All types" },
      search: { placeholder: "Search memories…",
                results_title: 'Results for "{q}" ({n})',
                no_results: 'No matches for "{q}"' },
      detail: {
        empty_hint: "Select an entity on the left to view its profile and memories",
        loading: "Loading…",
        none: "(none)",
        no_profile: "(no profile info)",
        no_entities: "No entities yet",
        no_results: "No relevant memories found",
        error: "Error: {msg}",
      },
      entity: {
        counts: "facts: {f} · reflections: {r}",
        profile_title: "Profile [{type}] {id}",
        section_facts: "Facts ({n})",
        section_reflections: "Reflections ({n})",
      },
      memory: {
        meta: "id: {id} · importance: {imp} · access: {access}",
        edit_title: "Edit memory {id}",
        text_label: "Text",
        importance_label: "Importance (1-10)",
        tags_label: "Tags (comma-separated)",
      },
      confirm: {
        archive: "Archive this memory?",
        gc: "Run a forgetting cycle now? Low-importance, long-unaccessed memories will be archived.",
        gc_done: "Archived {removed}, downgraded {downgraded}",
      },
      profile_fields: {
        name: "Name", nickname: "Nickname", aliases: "Aliases",
        platform: "Platform", traits: "Traits", preferences: "Preferences",
        relationships: "Relationships", facts: "Known facts",
        interactions: "Interactions",
      },
    },
    zh: {
      app: { title: "KiraOS 记忆" },
      stats: { entities: "实体", facts: "事实", reflections: "洞察", vector: "向量" },
      buttons: { run_gc: "运行 GC", edit: "编辑", archive: "归档", cancel: "取消", save: "保存" },
      filter: { all_types: "全部类型" },
      search: { placeholder: "搜索记忆…",
                results_title: '搜索结果："{q}" ({n})',
                no_results: '"{q}" 无匹配结果' },
      detail: {
        empty_hint: "从左侧选择实体查看其画像与记忆",
        loading: "加载中…",
        none: "（无）",
        no_profile: "（暂无画像信息）",
        no_entities: "暂无实体",
        no_results: "无相关记忆",
        error: "错误：{msg}",
      },
      entity: {
        counts: "facts: {f} · reflections: {r}",
        profile_title: "画像 [{type}] {id}",
        section_facts: "Facts ({n})",
        section_reflections: "Reflections ({n})",
      },
      memory: {
        meta: "id: {id} · importance: {imp} · access: {access}",
        edit_title: "编辑记忆 {id}",
        text_label: "文本",
        importance_label: "重要性 (1-10)",
        tags_label: "标签（逗号分隔）",
      },
      confirm: {
        archive: "归档此记忆？",
        gc: "立即运行遗忘周期？低重要性且长期未访问的记忆将被归档。",
        gc_done: "已归档 {removed} 条，降级 {downgraded} 条",
      },
      profile_fields: {
        name: "名字", nickname: "昵称", aliases: "曾用名",
        platform: "平台", traits: "特征", preferences: "偏好",
        relationships: "关系", facts: "已知事实",
        interactions: "互动次数",
      },
    },
  };

  function detectLang() {
    const urlParams = new URLSearchParams(window.location.search);
    const fromUrl = urlParams.get("lang");
    if (fromUrl && I18N[fromUrl]) {
      sessionStorage.setItem("kiraos-lang", fromUrl);
      urlParams.delete("lang");
      const newUrl = window.location.pathname + (urlParams.toString() ? "?" + urlParams : "");
      window.history.replaceState({}, document.title, newUrl);
      return fromUrl;
    }
    const stored = sessionStorage.getItem("kiraos-lang");
    if (stored && I18N[stored]) return stored;
    const nav = (navigator.language || "en").toLowerCase();
    return nav.startsWith("zh") ? "zh" : "en";
  }

  let currentLang = detectLang();

  function t(key, params) {
    const parts = key.split(".");
    let node = I18N[currentLang];
    for (const p of parts) {
      if (node == null || typeof node !== "object") break;
      node = node[p];
    }
    if (typeof node !== "string") {
      // Fall back to English when the key is missing in the active locale.
      let fb = I18N.en;
      for (const p of parts) {
        if (fb == null || typeof fb !== "object") break;
        fb = fb[p];
      }
      node = typeof fb === "string" ? fb : key;
    }
    if (params) {
      return node.replace(/\{(\w+)\}/g, (_, k) =>
        params[k] != null ? String(params[k]) : "{" + k + "}"
      );
    }
    return node;
  }

  function applyStaticTranslations() {
    for (const el of document.querySelectorAll("[data-i18n]")) {
      el.textContent = t(el.dataset.i18n);
    }
    for (const el of document.querySelectorAll("[data-i18n-attr]")) {
      // Format: "attr:key" e.g. "placeholder:search.placeholder"
      const spec = el.dataset.i18nAttr;
      const [attr, key] = spec.split(":");
      if (attr && key) el.setAttribute(attr, t(key));
    }
    document.documentElement.lang = currentLang;
  }

  function setLang(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    sessionStorage.setItem("kiraos-lang", lang);
    document.getElementById("lang-select").value = lang;
    applyStaticTranslations();
    // Re-render dynamic regions so their translated strings refresh too.
    refreshEntities();
    if (currentEntity) selectEntity(currentEntity.type, currentEntity.id);
  }
  window.setLang = setLang;

  // ── Token bootstrap ───────────────────────────────────────────────
  let token = sessionStorage.getItem("kiraos-token") || "";
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has("token")) {
    token = urlParams.get("token");
    sessionStorage.setItem("kiraos-token", token);
    urlParams.delete("token");
    const newUrl = window.location.pathname + (urlParams.toString() ? "?" + urlParams : "");
    window.history.replaceState({}, document.title, newUrl);
  }

  async function api(path, options = {}) {
    const headers = options.headers || {};
    if (token) headers["Authorization"] = "Bearer " + token;
    if (options.body && !(options.body instanceof FormData)) {
      headers["Content-Type"] = "application/json";
    }
    const res = await fetch(path, { ...options, headers });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(res.status + " " + txt);
    }
    return res.json();
  }

  let currentEntity = null;

  function renderStats(s) {
    document.getElementById("stat-entities").textContent = s.entities;
    document.getElementById("stat-facts").textContent = s.facts;
    document.getElementById("stat-reflections").textContent = s.reflections;
    document.getElementById("stat-vec").textContent = s.vec_available ? "✓" : "—";
  }

  function renderEntities(items) {
    const root = document.getElementById("entity-list");
    if (!items.length) {
      root.innerHTML = '<div class="empty">' + escapeHtml(t("detail.no_entities")) + '</div>';
      return;
    }
    root.innerHTML = items.map(e =>
      '<div class="entity-row" data-id="' + escapeHtml(e.entity_id) + '" data-type="' + e.entity_type + '">'
      + '<div class="name">' + escapeHtml(e.name) + '</div>'
      + '<div class="id">[' + e.entity_type + '] ' + escapeHtml(e.entity_id) + '</div>'
      + '<div class="counts">' + escapeHtml(t("entity.counts", { f: e.fact_count, r: e.reflection_count })) + '</div>'
      + '</div>'
    ).join("");
    for (const row of root.querySelectorAll(".entity-row")) {
      row.onclick = () => selectEntity(row.dataset.type, row.dataset.id, row);
    }
  }

  async function selectEntity(type, id, rowEl) {
    currentEntity = { type, id };
    document.querySelectorAll(".entity-row").forEach(r => r.classList.remove("active"));
    if (rowEl) rowEl.classList.add("active");
    const detail = document.getElementById("detail");
    detail.innerHTML = '<div class="empty">' + escapeHtml(t("detail.loading")) + '</div>';
    try {
      const data = await api("/api/entity/" + type + "/" + encodeURIComponent(id));
      detail.innerHTML = renderEntityDetail(data);
      bindMemoryActions();
    } catch (e) {
      detail.innerHTML = '<div class="empty">' + escapeHtml(t("detail.error", { msg: String(e) })) + '</div>';
    }
  }

  function renderEntityDetail(d) {
    const profileBlock = d.profile
      ? '<div class="panel profile"><h2>'
        + escapeHtml(t("entity.profile_title", { type: d.entity_type, id: d.entity_id }))
        + '</h2><pre>' + escapeHtml(formatProfile(d.profile)) + '</pre></div>'
      : "";
    return profileBlock
      + renderMemorySection("facts", d.facts)
      + renderMemorySection("reflections", d.reflections);
  }

  function renderMemorySection(folder, memories) {
    const title = folder === "facts"
      ? t("entity.section_facts", { n: memories.length })
      : t("entity.section_reflections", { n: memories.length });
    if (!memories.length) {
      return '<div class="panel"><h2>' + escapeHtml(title) + '</h2><div class="empty">' + escapeHtml(t("detail.none")) + '</div></div>';
    }
    const items = memories.map(m =>
      '<div class="memory" data-id="' + escapeHtml(m.id) + '">'
      + '<div class="meta">' + escapeHtml(t("memory.meta", { id: m.id, imp: m.importance, access: m.access_count })) + '</div>'
      + '<div class="text">' + escapeHtml(m.text) + '</div>'
      + '<div class="tags">' + (m.tags || []).map(tag => '<span class="tag">' + escapeHtml(tag) + '</span>').join("") + '</div>'
      + '<div class="actions">'
      + '<button data-action="edit" data-id="' + escapeHtml(m.id) + '">' + escapeHtml(t("buttons.edit")) + '</button>'
      + '<button class="danger" data-action="archive" data-id="' + escapeHtml(m.id) + '">' + escapeHtml(t("buttons.archive")) + '</button>'
      + '</div></div>'
    ).join("");
    return '<div class="panel"><h2>' + escapeHtml(title) + '</h2>' + items + '</div>';
  }

  function formatProfile(p) {
    const f = (key) => t("profile_fields." + key);
    const parts = [];
    if (p.name) parts.push(f("name") + ": " + p.name);
    if (p.nickname && p.nickname !== p.name) parts.push(f("nickname") + ": " + p.nickname);
    if (p.aliases && p.aliases.length) parts.push(f("aliases") + ": " + p.aliases.join(", "));
    if (p.platform) parts.push(f("platform") + ": " + p.platform);
    if (p.traits && p.traits.length) parts.push(f("traits") + ": " + p.traits.join(", "));
    if (p.preferences && Object.keys(p.preferences).length) {
      const prefs = Object.entries(p.preferences).map(([k, v]) => k + ": " + v).join(", ");
      parts.push(f("preferences") + ": " + prefs);
    }
    if (p.relationships && Object.keys(p.relationships).length) {
      const rels = Object.entries(p.relationships).map(([k, v]) => k + ": " + v).join(", ");
      parts.push(f("relationships") + ": " + rels);
    }
    if (p.facts && p.facts.length) {
      parts.push(f("facts") + ":\n  " + p.facts.map(x => "- " + x).join("\n  "));
    }
    parts.push(f("interactions") + ": " + (p.interaction_count || 0));
    return parts.join("\n") || t("detail.no_profile");
  }

  function bindMemoryActions() {
    for (const btn of document.querySelectorAll("[data-action]")) {
      btn.onclick = async () => {
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === "archive") {
          if (!confirm(t("confirm.archive"))) return;
          try {
            await api("/api/memory/" + encodeURIComponent(id), { method: "DELETE" });
            if (currentEntity) selectEntity(currentEntity.type, currentEntity.id);
            refreshStats();
          } catch (e) { alert(e); }
        } else if (action === "edit") {
          openEditModal(id);
        }
      };
    }
  }

  async function openEditModal(id) {
    let meta;
    try {
      meta = await api("/api/memory/" + encodeURIComponent(id));
    } catch (e) { alert(e); return; }
    const mem = meta.memory || meta.meta;
    const modal = document.createElement("div");
    modal.className = "modal-backdrop";
    modal.innerHTML =
      '<div class="modal">'
      + '<h3>' + escapeHtml(t("memory.edit_title", { id })) + '</h3>'
      + '<label>' + escapeHtml(t("memory.text_label")) + '</label>'
      + '<textarea id="m-text">' + escapeHtml(mem.text || mem.raw_text || "") + '</textarea>'
      + '<label>' + escapeHtml(t("memory.importance_label")) + '</label>'
      + '<input id="m-imp" type="number" min="1" max="10" value="' + (mem.importance || 5) + '" />'
      + '<label>' + escapeHtml(t("memory.tags_label")) + '</label>'
      + '<input id="m-tags" value="' + escapeHtml((mem.tags || []).join(", ")) + '" />'
      + '<div class="footer">'
      + '<button class="warn" id="m-cancel">' + escapeHtml(t("buttons.cancel")) + '</button>'
      + '<button id="m-save">' + escapeHtml(t("buttons.save")) + '</button>'
      + '</div></div>';
    document.body.appendChild(modal);
    modal.querySelector("#m-cancel").onclick = () => modal.remove();
    modal.querySelector("#m-save").onclick = async () => {
      const payload = {
        text: modal.querySelector("#m-text").value,
        importance: parseInt(modal.querySelector("#m-imp").value, 10),
        tags: modal.querySelector("#m-tags").value
          .split(",").map(t => t.trim()).filter(Boolean),
      };
      try {
        await api("/api/memory/" + encodeURIComponent(id), {
          method: "PUT", body: JSON.stringify(payload),
        });
        modal.remove();
        if (currentEntity) selectEntity(currentEntity.type, currentEntity.id);
      } catch (e) { alert(e); }
    };
  }

  async function runGC() {
    if (!confirm(t("confirm.gc"))) return;
    try {
      const r = await api("/api/gc", { method: "POST" });
      alert(t("confirm.gc_done", { removed: r.removed, downgraded: r.downgraded }));
      refreshStats();
      if (currentEntity) selectEntity(currentEntity.type, currentEntity.id);
    } catch (e) { alert(e); }
  }

  async function searchMemories(query) {
    if (!query.trim()) {
      const data = await api("/api/entities");
      renderEntities(data.entities);
      return;
    }
    try {
      const r = await api("/api/search", {
        method: "POST",
        body: JSON.stringify({ query, k: 15 }),
      });
      const root = document.getElementById("detail");
      if (!r.results.length) {
        root.innerHTML = '<div class="empty">' + escapeHtml(t("search.no_results", { q: query })) + '</div>';
        return;
      }
      root.innerHTML =
        '<div class="panel"><h2>' + escapeHtml(t("search.results_title", { q: query, n: r.results.length })) + '</h2>'
        + r.results.map(m =>
          '<div class="memory">'
          + '<div class="meta">[' + escapeHtml(m.entity_type) + ':' + escapeHtml(m.entity_id) + '] '
          + escapeHtml(m.folder) + ' · id=' + escapeHtml(m.id) + ' · imp=' + m.importance + '</div>'
          + '<div>' + escapeHtml(m.text) + '</div>'
          + '<div>' + (m.tags || []).map(tag => '<span class="tag">' + escapeHtml(tag) + '</span>').join("") + '</div>'
          + '</div>'
        ).join("") + "</div>";
    } catch (e) {
      alert(e);
    }
  }

  async function refreshStats() {
    try {
      const s = await api("/api/stats");
      renderStats(s);
    } catch (e) { console.warn("stats fetch failed", e); }
  }

  async function refreshEntities() {
    const etype = document.getElementById("type-filter").value;
    const qs = etype ? "?type=" + etype : "";
    try {
      const data = await api("/api/entities" + qs);
      renderEntities(data.entities);
    } catch (e) {
      document.getElementById("entity-list").innerHTML =
        '<div class="empty">' + escapeHtml(t("detail.error", { msg: String(e) })) + '</div>';
    }
  }

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // ── Wire ───────────────────────────────────────────────────────────
  document.getElementById("lang-select").value = currentLang;
  document.getElementById("lang-select").addEventListener("change", e => setLang(e.target.value));
  document.getElementById("gc-btn").addEventListener("click", runGC);

  let searchTimer;
  document.getElementById("search-input").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchMemories(e.target.value), 250);
  });
  document.getElementById("type-filter").addEventListener("change", refreshEntities);

  applyStaticTranslations();
  refreshStats();
  refreshEntities();
  setInterval(refreshStats, 15000);
})();
</script>
</body>
</html>
