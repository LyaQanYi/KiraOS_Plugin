<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KiraOS Memory WebUI</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #181b22;
    --bg-hi: #20242c;
    --line: #2a2f38;
    --text: #d7dae0;
    --muted: #8a93a3;
    --accent: #7aa2f7;
    --accent-warn: #e0af68;
    --danger: #f7768e;
    --ok: #9ece6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  .user-card { opacity: 1; transform: none; }
  .section { opacity: 1; transform: none; }
}

/* ═══════════════════════════════════════════════════════════════
   Accessibility: High Contrast Mode
   ═══════════════════════════════════════════════════════════════ */
@media (forced-colors: active) {
  .btn { border: 2px solid ButtonText; }
  .user-card { border: 1px solid ButtonText; }
  .user-card.active { border: 2px solid Highlight; }
  .nav-item.active { border: 2px solid Highlight; }
  .glass-card { border: 1px solid ButtonText; }
  .stat-card { border: 1px solid ButtonText; }
  .modal { border: 2px solid ButtonText; }
  .toast { border: 2px solid ButtonText; }
}

/* ═══════════════════════════════════════════════════════════════
   Phase 5: Insights (Reflections / Entities / Half-life / Timeline)
   ═══════════════════════════════════════════════════════════════ */
.insights-section { margin-top: 16px; }
.insights-tab-strip {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--glass-border);
}
.insights-tab {
  padding: 6px 12px; border-radius: 999px; cursor: pointer;
  background: transparent; border: 1px solid var(--glass-border);
  color: var(--text); font-size: 13px;
}
.insights-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.insights-tab:hover:not(.active) { background: var(--glass-bg); }

/* Reflections */
.reflection-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px dashed var(--glass-border);
}
.reflection-row:last-child { border-bottom: none; }
.reflection-badge {
  flex-shrink: 0; min-width: 60px; text-align: center;
  padding: 2px 8px; border-radius: 4px; font-size: 11px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.rf-pending   { background: #fde68a; color: #92400e; }
.rf-confirmed { background: #bfdbfe; color: #1e40af; }
.rf-promoted  { background: #bbf7d0; color: #047857; }
.rf-denied    { background: #fecaca; color: #991b1b; }
.rf-archived  { background: #e5e7eb; color: #4b5563; }
.reflection-body { flex: 1; }
.reflection-summary { font-size: 14px; line-height: 1.5; }
.reflection-meta {
  font-size: 11px; opacity: 0.7; margin-top: 2px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.reflection-actions { display: flex; gap: 4px; }

/* Entity buckets */
.entity-bucket {
  margin: 12px 0; padding: 10px 12px;
  border: 1px solid var(--glass-border); border-radius: 8px;
  background: var(--glass-bg);
}
.entity-header {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 10px; margin-bottom: 8px;
}
.entity-name { font-size: 14px; font-weight: 600; }
.entity-count {
  background: var(--accent); color: white;
  padding: 1px 8px; border-radius: 999px; font-size: 11px;
}
.entity-profiles { display: flex; flex-direction: column; gap: 4px; }
.entity-profile-row {
  display: flex; gap: 8px; font-size: 12px;
  padding: 3px 0; align-items: center;
}
.entity-profile-row .relation-chip {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: var(--accent); opacity: 0.7; color: white;
}

/* Half-life Playground */
.halflife-pad {
  display: flex; flex-direction: column; gap: 12px;
}
.halflife-slider-row {
  display: flex; align-items: center; gap: 10px; font-size: 13px;
}
.halflife-slider-row label { min-width: 110px; }
.halflife-slider-row input[type=range] { flex: 1; }
.halflife-slider-row .halflife-value {
  min-width: 50px; text-align: right; font-variant-numeric: tabular-nums;
  font-size: 12px;
}
.halflife-target-list {
  margin-top: 8px; max-height: 240px; overflow-y: auto;
  font-size: 12px;
}
.halflife-target-row {
  display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px;
  padding: 4px 0; border-bottom: 1px dashed var(--glass-border);
  align-items: center;
}
.halflife-target-row:last-child { border-bottom: none; }
.halflife-score {
  font-variant-numeric: tabular-nums; font-weight: 600;
}
.halflife-score.score-pos { color: #047857; }
.halflife-score.score-neg { color: #b91c1c; }
.halflife-score.score-zero { opacity: 0.6; }

/* Evidence timeline modal-ish drawer */
.timeline-drawer {
  margin-top: 12px; padding: 12px;
  border: 1px solid var(--glass-border); border-radius: 8px;
  background: var(--glass-bg);
}
.timeline-drawer-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.timeline-snapshot {
  display: flex; gap: 16px; flex-wrap: wrap;
  font-size: 12px; opacity: 0.85;
  padding: 6px 0 10px;
}
.timeline-snapshot strong { font-variant-numeric: tabular-nums; }
.timeline-events {
  display: flex; flex-direction: column; gap: 3px;
  max-height: 240px; overflow-y: auto;
  font-size: 11px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.timeline-event-row {
  display: grid;
  grid-template-columns: 120px 70px 70px 1fr;
  gap: 8px; padding: 2px 0;
}
.te-rein { color: #047857; }
.te-disp { color: #b91c1c; }
.decay-svg {
  width: 100%; height: 120px;
  background: var(--glass-bg); border-radius: 6px;
  margin-top: 8px;
}
.decay-svg .rein-line { stroke: #047857; stroke-width: 1.5; fill: none; }
.decay-svg .disp-line { stroke: #b91c1c; stroke-width: 1.5; fill: none; }
.decay-svg .axis { stroke: var(--glass-border); stroke-width: 1; }
.decay-svg .axis-label {
  fill: var(--text); opacity: 0.6;
  font-size: 9px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
}

/* Inline launcher button for the timeline drawer */
.btn-tiny {
  font-size: 10px; padding: 2px 6px;
  border-radius: 4px; border: 1px solid var(--glass-border);
  background: transparent; color: var(--text); cursor: pointer;
  opacity: 0.7;
}
.btn-tiny:hover { opacity: 1; background: var(--glass-bg); }
</style>
</head>
<body>
<header>
  <h1>🧠 KiraOS Memory</h1>
  <span class="stat" id="stat-line">loading…</span>
  <input type="search" id="search-box" placeholder="搜索记忆 (回车)…" />
</header>
<main>
  <aside>
    <div class="filter" id="type-filter">
      <button class="active" data-type="">全部</button>
      <button data-type="user">user</button>
      <button data-type="group">group</button>
      <button data-type="channel">channel</button>
    </div>
    <div id="entity-list"></div>
  </aside>
  <section class="detail" id="detail">
    <div class="empty">← 从左侧选择一个实体查看记忆</div>
  </section>
</main>
<script>
/* ═══════════════════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════════════════ */
let allUsers = [];
let selectedUserId = null;
let userData = null;
let editingKey = null;
let modalCallback = null;
let _selectRequestId = 0;
let currentPage = 'overview';       // 'overview' | 'memory'
let memoryNavExpanded = false;
let liveUpdateEnabled = true;
let _liveTimer = null;
let _liveUpdating = false;
const LIVE_INTERVAL = 1000;
let _lastUsersJson = '';
let _lastUserDataJson = '';
let addingProfile = false;
let addingEvent = false;
let editingEventId = null;
/* ── Phase 5: insights state ──────────────────────────────────── */
// 'reflections' | 'entities' | 'halflife' — persists across re-renders
// so a live-refresh on the user detail doesn't snap back to the
// default tab while the user is reading something else.
let currentInsightTab = 'reflections';
let lastReflections = [];
let lastEntities = [];
// Half-life slider state — user-adjustable, defaults match the
// EvidenceConfig defaults in schema.json.
let halflifeRein = 14;
let halflifeDisp = 7;
// Preview map: target_id → effective score, refreshed when sliders
// move so renderHalfLife() can show "would-be" numbers per target.
let halflifePreviewById = {};
// Mounted timeline drawer state. We keep at most one drawer open at
// a time so clicking a new row replaces the previous drawer rather
// than stacking them.
let timelineDrawerKey = null;

/* ═══════════════════════════════════════════════════════════════
   API Helpers
   ═══════════════════════════════════════════════════════════════ */
function getToken() {
  const stored = sessionStorage.getItem('kiraos_token');
  if (stored !== null) return stored;
  const params = new URLSearchParams(location.search);
  const token = params.get('token') || '';
  sessionStorage.setItem('kiraos_token', token);
  if (params.has('token')) {
    params.delete('token');
    const qs = params.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
  }
  return token;
}

async function api(path, opts = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch('/api' + path, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

/* ═══════════════════════════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════════════════════════ */
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  // Announce to dedicated live region for screen readers
  const live = document.getElementById('statusLive');
  if (live) live.textContent = message;
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(30px)'; toast.style.transition = '0.3s'; }, 2500);
  setTimeout(() => toast.remove(), 2800);
}

/* ═══════════════════════════════════════════════════════════════
   Modal
   ═══════════════════════════════════════════════════════════════ */
let _previousFocus = null;

function showModal(title, message, callback) {
  _previousFocus = document.activeElement;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMessage').textContent = message;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('show');
  modalCallback = callback;
  setTimeout(() => {
    const firstBtn = overlay.querySelector('.modal .btn');
    if (firstBtn) firstBtn.focus();
  }, 100);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('show');
  modalCallback = null;
  if (_previousFocus) { _previousFocus.focus(); _previousFocus = null; }
}

function confirmModal() {
  if (modalCallback) modalCallback();
  document.getElementById('modalOverlay').classList.remove('show');
  modalCallback = null;
  if (_previousFocus) { _previousFocus.focus(); _previousFocus = null; }
}

document.addEventListener('keydown', function(e) {
  const overlay = document.getElementById('modalOverlay');
  if (!overlay.classList.contains('show')) return;
  if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
  if (e.key === 'Tab') {
    const focusable = overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
  }
  return t;
})();

const headers = token ? { Authorization: `Bearer ${token}` } : {};

async function api(path, opts = {}) {
  const init = { ...opts, headers: { ...headers, ...(opts.headers || {}) } };
  if (init.body && typeof init.body === "object" && !(init.body instanceof FormData)) {
    init.body = JSON.stringify(init.body);
    init.headers["Content-Type"] = "application/json";
  }
  const r = await fetch(path, init);
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`${r.status} ${t}`);
  }
  return r.json();
}

let currentType = "";
let selected = null;

async function refreshStats() {
  try {
    const s = await api("/api/stats");
    const counts = Object.entries(s.entities_by_type)
      .map(([t, n]) => `${t}=${n}`).join(" ");
    document.getElementById("stat-line").textContent =
      `${s.entity_count} 个实体 (${counts || "—"})  ·  ${s.fact_count} facts  ·  ${s.reflection_count} reflections`;
  } catch (e) {
    document.getElementById("stat-line").textContent = "stats failed: " + e.message;
  }
}

async function refreshEntities() {
  const qs = currentType ? `?type=${currentType}` : "";
  const { entities } = await api(`/api/entities${qs}`);
  const list = document.getElementById("entity-list");
  list.innerHTML = "";
  if (!entities.length) {
    list.innerHTML = '<div class="empty">暂无实体</div>';
    return;
  }
  for (const e of entities) {
    const div = document.createElement("div");
    div.className = "entity";
    if (selected && selected.entity_id === e.entity_id && selected.entity_type === e.entity_type) {
      div.classList.add("selected");
    }
    // 键盘可访问性：纯 div + onclick 屏幕阅读器无法识别，键盘用户也按不到。
    // 加 role=button / tabindex=0 进 Tab 序列，并把 Enter / Space 当点击处理。
    div.setAttribute("role", "button");
    div.setAttribute("tabindex", "0");
    div.setAttribute(
      "aria-label",
      `${e.entity_type} ${e.entity_id} — ${e.label}，互动 ${e.interaction_count} 次`
    );
    div.innerHTML = `
      <div class="label">${escapeHtml(e.label)}</div>
      <div class="meta">${e.entity_type} · ${escapeHtml(e.entity_id)} · 互动 ${e.interaction_count}</div>
    `;
    const activate = () => selectEntity(e.entity_id, e.entity_type);
    div.onclick = activate;
    div.onkeydown = (ev) => {
      if (ev.key === "Enter" || ev.key === " " || ev.key === "Spacebar") {
        ev.preventDefault();
        activate();
      }
    };
    list.appendChild(div);
  }
}

async function selectEntity(entity_id, entity_type) {
  selected = { entity_id, entity_type };
  document.querySelectorAll("#entity-list .entity").forEach(d => d.classList.remove("selected"));
  await refreshEntities();
  await renderDetail();
}

async function renderDetail() {
  if (!selected) return;
  const detail = document.getElementById("detail");
  detail.innerHTML = '<div class="empty">loading…</div>';
  let data;
  try {
    data = await api(`/api/entity/${selected.entity_type}/${encodeURIComponent(selected.entity_id)}`);
  } catch (e) {
    detail.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
    return;
  }
  const p = data.profile;
  detail.innerHTML = `
    <h2>${escapeHtml(p.name || p.nickname || data.entity_id)}</h2>
    <div class="subtitle">${data.entity_type} · ${escapeHtml(data.entity_id)} · 互动 ${p.interaction_count} 次</div>

    <div class="card">
      <h3>画像 (profile.json)</h3>
      <div class="row"><label>name</label><input id="p-name" value="${escapeAttr(p.name || "")}"/></div>
      <div class="row"><label>nickname</label><input id="p-nickname" value="${escapeAttr(p.nickname || "")}"/></div>
      <div class="row"><label>platform</label><input id="p-platform" value="${escapeAttr(p.platform || "")}"/></div>
      <div class="row"><label>description</label><textarea id="p-description">${escapeHtml(p.description || "")}</textarea></div>
      <div class="row"><label>traits</label><span>${(p.traits || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(" ") || '<span style="color:var(--muted)">无</span>'}</span></div>
      <div class="row"><label>preferences</label><span>${formatDictTags(p.preferences)}</span></div>
      <div class="row"><label>relationships</label><span>${formatDictTags(p.relationships)}</span></div>
      <div class="row"><label>facts</label><span>${(p.facts || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(" ") || '<span style="color:var(--muted)">无</span>'}</span></div>
      <div class="row" style="margin-top:8px;">
        <button class="primary" id="save-profile">保存画像</button>
        <button class="ghost danger" id="delete-entity">删除整个实体</button>
      </div>
    </div>

    <div class="card">
      <h3>Facts (${data.facts.length})</h3>
      <div class="memory-list" id="facts-list"></div>
      <div class="row" style="margin-top:10px;">
        <input id="new-fact-text" placeholder="新增一条 fact 文本…"/>
        <button class="primary" id="add-fact">添加</button>
      </div>
    </div>

    <div class="card">
      <h3>Reflections (${data.reflections.length})</h3>
      <div class="memory-list" id="reflections-list"></div>
    </div>
    ${eventHtml || '<div class="glass-card section" role="status"><div class="empty-state" style="padding:24px"><p>暂无事件记录</p></div></div>'}

    <!-- Phase 5: Insights stack — Reflections, Entities, Half-life,
         and a per-target Evidence Timeline drawer (lazy-mounted). -->
    <div class="insights-section">
      <div class="section-title-row" style="margin-top:8px;">
        <h3 class="section-title">洞察 <span style="font-size:11px;opacity:0.6;margin-left:6px;">三层认知 · Evidence · 实体</span></h3>
        <div class="insights-tab-strip" id="insightsTabs" role="tablist" aria-label="洞察视图切换">
          <button class="insights-tab active" data-insight-tab="reflections" onclick="switchInsightTab('reflections')">反思</button>
          <button class="insights-tab" data-insight-tab="entities" onclick="switchInsightTab('entities')">实体</button>
          <button class="insights-tab" data-insight-tab="halflife" onclick="switchInsightTab('halflife')">半衰期</button>
        </div>
      </div>
      <div class="glass-card section" id="insightPanel">
        <div class="empty-state" style="padding:16px"><p>加载中…</p></div>
      </div>
      <div id="timelineDrawerMount"></div>
    </div>
  `;
  setupReveal(document.getElementById('contentArea'));
  // Render the currently-selected insights tab. Defaults to
  // "reflections" on first detail load; preserves whatever tab the
  // user previously clicked across renderDetail() invocations.
  switchInsightTab(currentInsightTab || 'reflections');
}

function renderMemoryList(containerId, items, folder) {
  const c = document.getElementById(containerId);
  if (!items.length) {
    c.innerHTML = '<div class="empty" style="padding:14px;">无</div>';
    return;
  }
  c.innerHTML = "";
  for (const m of items) {
    const div = document.createElement("div");
    div.className = "memory-item";
    const ts = m.timestamp ? new Date(m.timestamp * 1000).toLocaleString() : "";
    const tagsHtml = (m.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(" ");
    div.innerHTML = `
      <div class="meta">
        <span>id=${escapeHtml(m.id)}</span>
        <span>importance=${m.importance}</span>
        <span>access=${m.access_count}</span>
        ${ts ? `<span>${escapeHtml(ts)}</span>` : ""}
        ${tagsHtml}
      </div>
      <div class="text">${escapeHtml(m.text || "")}</div>
      <div class="row" style="margin-top:6px;">
        <button class="ghost" data-action="edit">编辑</button>
        <button class="ghost danger" data-action="delete">归档</button>
      </div>
    `;
    div.querySelector('[data-action="edit"]').onclick = () => editMemory(m, folder);
    div.querySelector('[data-action="delete"]').onclick = () => deleteMemory(m, folder);
    c.appendChild(div);
  }
}

async function saveProfile() {
  const body = {
    name: document.getElementById("p-name").value,
    nickname: document.getElementById("p-nickname").value,
    platform: document.getElementById("p-platform").value,
    description: document.getElementById("p-description").value,
  };
  try {
    await api(
      `/api/entity/${selected.entity_type}/${encodeURIComponent(selected.entity_id)}/profile`,
      { method: "PUT", body },
    );
    // 侧边栏的 label 来自 /api/entities 的 profile.name / nickname，
    // 改完 profile 必须同步刷新左边，不然名称会滞后到下一次轮询。
    await Promise.all([renderDetail(), refreshEntities()]);
  } catch (e) {
    alert("保存失败: " + e.message);
  }
}

async function deleteEntity() {
  if (!confirm(`确认删除整个实体 ${selected.entity_type}:${selected.entity_id}？\n所有数据将归档到 archive/，可恢复但不再被检索。`)) return;
  try {
    await api(`/api/entity/${selected.entity_type}/${encodeURIComponent(selected.entity_id)}`, { method: "DELETE" });
    selected = null;
    document.getElementById("detail").innerHTML = '<div class="empty">已删除</div>';
    await refreshEntities();
    await refreshStats();
  } catch (e) {
    alert("删除失败: " + e.message);
  }
}

async function addFact() {
  const input = document.getElementById("new-fact-text");
  const text = input.value.trim();
  if (!text) return;
  try {
    await api(
      `/api/entity/${selected.entity_type}/${encodeURIComponent(selected.entity_id)}/facts`,
      { method: "POST", body: { text, importance: 5 } },
    );
    input.value = "";
    await renderDetail();
    await refreshStats();
  } catch (e) {
    alert("添加失败: " + e.message);
  }
}

async function editMemory(m, folder) {
  const newText = prompt("编辑记忆文本:", m.text);
  if (newText == null) return;
  try {
    await api(
      `/api/memory/${selected.entity_type}/${encodeURIComponent(selected.entity_id)}/${folder}/${encodeURIComponent(m.id)}`,
      { method: "PUT", body: { text: newText } },
    );
    await renderDetail();
  } catch (e) {
    alert("编辑失败: " + e.message);
  }
}

async function deleteMemory(m, folder) {
  if (!confirm(`归档此记忆？\n${m.text}`)) return;
  try {
    await api(
      `/api/memory/${selected.entity_type}/${encodeURIComponent(selected.entity_id)}/${folder}/${encodeURIComponent(m.id)}`,
      { method: "DELETE" },
    );
    await renderDetail();
    await refreshStats();
  } catch (e) {
    alert("归档失败: " + e.message);
  }
}

async function runSearch(q) {
  const eid = selected ? selected.entity_id : "";
  // Empty entity_type = global cross-type search; the backend now fans out
  // over every entity instead of falling back to ENTITY_USER.
  const etype = selected ? selected.entity_type : "";
  let res;
  try {
    res = await api(
      `/api/search?q=${encodeURIComponent(q)}&entity_id=${encodeURIComponent(eid)}&entity_type=${etype}&k=10`,
    );
  } catch (e) {
    alert("搜索失败: " + e.message);
    return;
  }
  const detail = document.getElementById("detail");
  detail.innerHTML = `
    <h2>搜索: "${escapeHtml(q)}"</h2>
    <div class="subtitle">entity=${escapeHtml(eid || "(当前)")} · ${res.memories.length} 条结果</div>
    <div class="card"><div class="memory-list">${
      res.memories.length
        ? res.memories.map(m => `
            <div class="memory-item">
              <div class="meta">
                <span>id=${escapeHtml(m.id)}</span>
                <span>${m.entity_type}:${escapeHtml(m.entity_id)}/${escapeHtml(m.folder)}</span>
                <span>importance=${m.importance}</span>
                ${(m.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(" ")}
              </div>
              <div class="text">${escapeHtml(m.text)}</div>
            </div>
          `).join("")
        : '<div class="empty">无结果</div>'
    }</div></div>
  `;
}

function formatDictTags(d) {
  if (!d || !Object.keys(d).length) return '<span style="color:var(--muted)">无</span>';
  return Object.entries(d).map(([k, v]) => `<span class="tag">${escapeHtml(k)}: ${escapeHtml(v)}</span>`).join(" ");
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, "&quot;");
}

document.querySelectorAll("#type-filter button").forEach(btn => {

function switchInsightTab(tab) {
  currentInsightTab = tab;
  document.querySelectorAll('.insights-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.insightTab === tab);
  });
  // The drawer is per-target; switching tabs hides it so a stale
  // drilldown from the previous tab doesn't visually attach to a
  // newly-rendered view.
  closeTimelineDrawer();
  if (tab === 'reflections') return loadReflectionsTab();
  if (tab === 'entities') return loadEntitiesTab();
  if (tab === 'halflife') return loadHalfLifeTab();
}

function _statusBadge(status) {
  const cls = {
    pending: 'rf-pending', confirmed: 'rf-confirmed',
    promoted: 'rf-promoted', denied: 'rf-denied',
    archived: 'rf-archived', merged: 'rf-archived',
  }[status] || 'rf-pending';
  return `<span class="reflection-badge ${cls}">${escapeHtml(status)}</span>`;
}

function _formatEpoch(sec) {
  if (!sec) return '—';
  try {
    const d = new Date(Number(sec) * 1000);
    return d.toISOString().substring(0, 16).replace('T', ' ');
  } catch (_) { return '—'; }
}

/* ── Reflections tab ─────────────────────────────────────────── */
async function loadReflectionsTab() {
  const panel = document.getElementById('insightPanel');
  if (!panel || !selectedUserId) return;
  panel.innerHTML = '<div class="empty-state" style="padding:16px"><p>加载反思中…</p></div>';
  try {
    const resp = await api('/users/' + encodeURIComponent(selectedUserId) + '/reflections');
    lastReflections = resp.reflections || [];
    renderReflectionsTab();
  } catch (e) {
    panel.innerHTML = '<div class="empty-state" style="padding:16px" role="alert"><p>加载失败: ' + escapeHtml(e.message) + '</p></div>';
  }
}

function renderReflectionsTab() {
  const panel = document.getElementById('insightPanel');
  if (!panel) return;
  if (!lastReflections.length) {
    panel.innerHTML = '<div class="empty-state" style="padding:16px"><p>暂无反思 — 启用 enable_reflection_synthesis 并积累 ≥5 条原子事件后会自动出现。</p></div>';
    return;
  }
  // Sort: pending → confirmed → promoted → denied/archived
  const order = { pending: 0, confirmed: 1, promoted: 2, denied: 3, archived: 4, merged: 4 };
  const sorted = lastReflections.slice().sort((a, b) =>
    (order[a.status] ?? 5) - (order[b.status] ?? 5) || (b.id - a.id)
  );
  panel.innerHTML = sorted.map(r => `
    <div class="reflection-row" data-reflection-id="${r.id}">
      ${_statusBadge(r.status)}
      <div class="reflection-body">
        <div class="reflection-summary">${escapeHtml(r.summary)}</div>
        <div class="reflection-meta">
          ${r.entity ? `<span>实体: <strong>${escapeHtml(r.entity)}</strong></span>` : ''}
          ${r.relation_type ? `<span>关系: ${escapeHtml(r.relation_type)}</span>` : ''}
          <span>支撑事件: ${(r.source_fact_ids || []).length}</span>
          <span>创建: ${_formatEpoch(r.created_at)}</span>
          <button class="btn-tiny" onclick="openTimelineDrawer('reflection', '${r.id}', '反思 #${r.id}')">📈 时间线</button>
        </div>
      </div>
      <div class="reflection-actions">
        ${r.status === 'pending' || r.status === 'confirmed' ? `
          <button class="btn btn-icon btn-primary" onclick="promoteReflection(${r.id})" title="晋升到画像" aria-label="晋升反思 #${r.id}">✓</button>
          <button class="btn btn-icon btn-danger" onclick="denyReflection(${r.id})" title="拒绝该反思" aria-label="拒绝反思 #${r.id}">×</button>
        ` : ''}
      </div>
    </div>
  `).join('');
}

/* ── Half-life Playground ─────────────────────────────────────── */
async function loadHalfLifeTab() {
  const panel = document.getElementById('insightPanel');
  if (!panel) return;
  // Reuse the entities + reflections lists to enumerate targets so the
  // playground covers everything the user can see on this page.
  // Loading is lazy: if we haven't fetched them this session, do it now.
  if (!lastEntities.length) {
    try {
      const resp = await api('/users/' + encodeURIComponent(selectedUserId) + '/entities');
      lastEntities = resp.entities || [];
    } catch (_) {}
  }
  if (!lastReflections.length) {
    try {
      const resp = await api('/users/' + encodeURIComponent(selectedUserId) + '/reflections');
      lastReflections = resp.reflections || [];
    } catch (_) {}
  }
  renderHalfLifeTab();
  // Kick off an initial preview so the table isn't full of '—' on first
  // render. updateHalfLifePreviews is throttled so subsequent slider
  // moves don't pile up requests.
  scheduleHalfLifePreview();
}

function renderHalfLifeTab() {
  const panel = document.getElementById('insightPanel');
  if (!panel) return;
  const targets = collectHalfLifeTargets();
  panel.innerHTML = `
    <div class="halflife-pad">
      <div class="halflife-slider-row">
        <label for="hl-rein">Rein 半衰期</label>
        <input type="range" id="hl-rein" min="1" max="90" step="1"
               value="${halflifeRein}"
               oninput="onHalfLifeChange('rein', this.value)"
               aria-valuemin="1" aria-valuemax="90" aria-valuenow="${halflifeRein}">
        <span class="halflife-value" id="hl-rein-val">${halflifeRein} 天</span>
      </div>
      <div class="halflife-slider-row">
        <label for="hl-disp">Disp 半衰期</label>
        <input type="range" id="hl-disp" min="1" max="90" step="1"
               value="${halflifeDisp}"
               oninput="onHalfLifeChange('disp', this.value)"
               aria-valuemin="1" aria-valuemax="90" aria-valuenow="${halflifeDisp}">
        <span class="halflife-value" id="hl-disp-val">${halflifeDisp} 天</span>
      </div>
      <div style="font-size:11px;opacity:0.7;line-height:1.4;">
        拖动滑块查看每个目标在新半衰期下的 effective score（read-only，不写入 DB）。
        score = effective_rein − effective_disp；绿色表示净支持，红色表示净否决。
      </div>
      <div class="halflife-target-list" id="hlTargetList">
        ${targets.length === 0
          ? '<div class="empty-state" style="padding:12px"><p>没有可预览的目标。</p></div>'
          : targets.map(t => {
              const score = halflifePreviewById[t.key];
              const scoreCls = score === undefined ? 'score-zero'
                              : score > 0.01 ? 'score-pos'
                              : score < -0.01 ? 'score-neg'
                              : 'score-zero';
              const scoreText = score === undefined ? '—' : score.toFixed(3);
              return `<div class="halflife-target-row">
                <span>${escapeHtml(t.label)}</span>
                <span style="font-size:11px;opacity:0.6">${t.kind}</span>
                <span class="halflife-score ${scoreCls}">${scoreText}</span>
                <button class="btn-tiny" onclick="openTimelineDrawer('${t.kind}', '${escapeAttr(t.id)}', '${escapeAttr(t.label)}')">📈</button>
              </div>`;
            }).join('')
        }
      </div>
    </div>
  `;
}

function collectHalfLifeTargets() {
  const out = [];
  for (const e of lastEntities) {
    for (const p of e.profiles) {
      out.push({
        kind: 'profile',
        id: selectedUserId + '::' + p.key,
        label: '画像 · ' + p.key,
      });
    }
  }
  for (const r of lastReflections) {
    out.push({
      kind: 'reflection',
      id: String(r.id),
      label: '反思 #' + r.id + ' · ' + (r.summary || '').slice(0, 24),
    });
  }
  return out;
}

let _hlPreviewTimer = null;
function onHalfLifeChange(which, value) {
  // Update both the model state and the visible numeric chip.
  if (which === 'rein') {
    halflifeRein = Number(value);
    document.getElementById('hl-rein-val').textContent = halflifeRein + ' 天';
  } else {
    halflifeDisp = Number(value);
    document.getElementById('hl-disp-val').textContent = halflifeDisp + ' 天';
  }
  // Debounce so dragging the slider doesn't fire dozens of requests.
  scheduleHalfLifePreview();
}

function scheduleHalfLifePreview() {
  if (_hlPreviewTimer) clearTimeout(_hlPreviewTimer);
  _hlPreviewTimer = setTimeout(updateHalfLifePreviews, 150);
}

async function updateHalfLifePreviews() {
  const targets = collectHalfLifeTargets();
  if (!targets.length) return;
  // Fire all preview calls concurrently — backend computation is
  // O(1) per call (just a decay formula), so latency is dominated
  // by request RTT. Promise.all is the simplest way to fan out.
  const results = await Promise.all(targets.map(async t => {
    try {
      const r = await api('/evidence/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          target_kind: t.kind, target_id: t.id,
          rein_half_life_days: halflifeRein,
          disp_half_life_days: halflifeDisp,
        }),
      });
      return [t.key !== undefined ? t.key : (t.kind + ':' + t.id),
              r.score === undefined ? 0 : Number(r.score)];
    } catch (_) {
      return [(t.kind + ':' + t.id), undefined];
    }
  }));
  halflifePreviewById = {};
  for (const t of targets) halflifePreviewById[t.key !== undefined ? t.key : (t.kind + ':' + t.id)] = undefined;
  for (const [k, v] of results) halflifePreviewById[k] = v;
  // Re-render the target list only (not the sliders) so the user's
  // grip on the slider thumb doesn't get reset by a DOM swap.
  const list = document.getElementById('hlTargetList');
  if (!list) return;
  const targets2 = collectHalfLifeTargets();
  list.innerHTML = targets2.map(t => {
    const key = t.kind + ':' + t.id;
    const score = halflifePreviewById[key];
    const scoreCls = score === undefined ? 'score-zero'
                    : score > 0.01 ? 'score-pos'
                    : score < -0.01 ? 'score-neg'
                    : 'score-zero';
    const scoreText = score === undefined ? '—' : score.toFixed(3);
    return `<div class="halflife-target-row">
      <span>${escapeHtml(t.label)}</span>
      <span style="font-size:11px;opacity:0.6">${t.kind}</span>
      <span class="halflife-score ${scoreCls}">${scoreText}</span>
      <button class="btn-tiny" onclick="openTimelineDrawer('${t.kind}', '${escapeAttr(t.id)}', '${escapeAttr(t.label)}')">📈</button>
    </div>`;
  }).join('');
}

/* ── Evidence Timeline drilldown drawer ──────────────────────── */
async function openTimelineDrawer(kind, targetId, label) {
  const mount = document.getElementById('timelineDrawerMount');
  if (!mount) return;
  const key = kind + ':' + targetId;
  // Click the same row's launcher again → close (toggle).
  if (timelineDrawerKey === key) {
    closeTimelineDrawer();
    return;
  }
  timelineDrawerKey = key;
  mount.innerHTML = '<div class="timeline-drawer"><div class="empty-state" style="padding:8px"><p>加载时间线…</p></div></div>';
  try {
    const r = await api('/evidence/timeline/' + encodeURIComponent(kind) + '/' + encodeURIComponent(targetId));
    renderTimelineDrawer(mount, label, r);
  } catch (e) {
    mount.innerHTML = '<div class="timeline-drawer"><div class="empty-state" style="padding:8px" role="alert"><p>加载失败: ' + escapeHtml(e.message) + '</p></div></div>';
  }
}

function closeTimelineDrawer() {
  const mount = document.getElementById('timelineDrawerMount');
  if (mount) mount.innerHTML = '';
  timelineDrawerKey = null;
}

function renderTimelineDrawer(mount, label, data) {
  const snap = data.snapshot || {};
  const history = data.history || [];
  const decaySvg = buildDecayCurveSvg(snap);
  const eventsHtml = history.length === 0
    ? '<div class="empty-state" style="padding:8px"><p>暂无信号记录。</p></div>'
    : history.map(h => {
        const cls = h.rein_delta > 0 ? 'te-rein' : h.disp_delta > 0 ? 'te-disp' : '';
        const delta = h.rein_delta > 0
          ? '+' + Number(h.rein_delta).toFixed(2) + ' rein'
          : h.disp_delta > 0
            ? '+' + Number(h.disp_delta).toFixed(2) + ' disp'
            : '0';
        return `<div class="timeline-event-row ${cls}">
          <span>${_formatEpoch(h.applied_at)}</span>
          <span>${escapeHtml(h.source || '—')}</span>
          <span>${delta}</span>
          <span></span>
        </div>`;
      }).join('');
  mount.innerHTML = `
    <div class="timeline-drawer">
      <div class="timeline-drawer-header">
        <strong>📈 ${escapeHtml(label)}</strong>
        <button class="btn btn-icon btn-ghost" onclick="closeTimelineDrawer()" aria-label="关闭时间线">×</button>
      </div>
      <div class="timeline-snapshot">
        <span>当前 rein: <strong>${(snap.rein ?? 0).toFixed(3)}</strong></span>
        <span>当前 disp: <strong>${(snap.disp ?? 0).toFixed(3)}</strong></span>
        <span>last rein signal: <strong>${_formatEpoch(snap.rein_last_signal_at)}</strong></span>
        <span>last disp signal: <strong>${_formatEpoch(snap.disp_last_signal_at)}</strong></span>
        <span>user_fact 计数: <strong>${snap.user_fact_reinforce_count ?? 0}</strong></span>
      </div>
      ${decaySvg}
      <div class="timeline-events" role="log">${eventsHtml}</div>
    </div>
  `;
}

function buildDecayCurveSvg(snap) {
  // Renders rein & disp values across the next 60 days using the
  // current half-life sliders. Purely client-side math — no extra
  // backend round-trip needed.
  const W = 600, H = 120, PAD = 18;
  const rein0 = Number(snap.rein || 0);
  const disp0 = Number(snap.disp || 0);
  const reinHl = halflifeRein || 14;
  const dispHl = halflifeDisp || 7;
  const days = 60;
  // Build polylines
  const reinPoints = [];
  const dispPoints = [];
  let maxVal = Math.max(rein0, disp0, 0.5);
  for (let d = 0; d <= days; d++) {
    const r = rein0 * Math.pow(0.5, d / reinHl);
    const dv = disp0 * Math.pow(0.5, d / dispHl);
    reinPoints.push([d, r]);
    dispPoints.push([d, dv]);
  }
  const toX = d => PAD + (W - 2 * PAD) * (d / days);
  const toY = v => H - PAD - (H - 2 * PAD) * (v / maxVal);
  const polyline = pts => pts.map(([d, v]) => toX(d) + ',' + toY(v).toFixed(1)).join(' ');
  // X-axis tick at "now" (d=0) + 30d + 60d
  const axisTicks = [0, 30, 60].map(d =>
    `<line class="axis" x1="${toX(d)}" y1="${H - PAD}" x2="${toX(d)}" y2="${H - PAD + 3}"/>` +
    `<text class="axis-label" x="${toX(d)}" y="${H - 4}" text-anchor="middle">${d}d</text>`
  ).join('');
  return `<svg class="decay-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-label="衰减曲线 60 天预测">
    <line class="axis" x1="${PAD}" y1="${H - PAD}" x2="${W - PAD}" y2="${H - PAD}"/>
    <line class="axis" x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H - PAD}"/>
    ${axisTicks}
    <polyline class="rein-line" points="${polyline(reinPoints)}"/>
    <polyline class="disp-line" points="${polyline(dispPoints)}"/>
    <text class="axis-label" x="${W - PAD - 4}" y="${PAD + 10}" text-anchor="end">绿: rein · 红: disp</text>
  </svg>`;
}

loadUsers();
